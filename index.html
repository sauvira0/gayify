  <style>
    :root {
      --void: #07040c;
      --ink: #12081a;
      --pink: #ff4db8;
      --hot: #ff2d8a;
      --violet: #b44dff;
      --gold: #e8c547;
      --champagne: #f5e6c8;
      --mint: #5dffc7;
      --glass: rgba(255,255,255,0.06);
      --glass-border: rgba(255,255,255,0.14);
      --safe-t: env(safe-area-inset-top, 0px);
      --safe-b: env(safe-area-inset-bottom, 0px);
      --safe-l: env(safe-area-inset-left, 0px);
      --safe-r: env(safe-area-inset-right, 0px);
      --persona: #ff4db8;
      --vvh: 100dvh;
      --kb: 0px;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%;
      height: 100dvh;
      margin: 0;
      overflow: hidden;
      font-family: 'DM Sans', system-ui, sans-serif;
      color: #f7eef8;
      background: var(--void);
      overscroll-behavior: none;
      touch-action: manipulation;
      -webkit-text-size-adjust: 100%;
    }

    body {
      background:
        radial-gradient(ellipse 80% 50% at 20% -10%, rgba(255,77,184,0.18), transparent 55%),
        radial-gradient(ellipse 60% 40% at 90% 10%, rgba(180,77,255,0.14), transparent 50%),
        radial-gradient(ellipse 50% 40% at 50% 100%, rgba(232,197,71,0.08), transparent 50%),
        linear-gradient(180deg, #0c0614 0%, #07040c 40%, #0a0612 100%);
      padding: env(safe-area-inset-top, 0) env(safe-area-inset-right, 0) 0 env(safe-area-inset-left, 0);
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    .grain::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9998;
      opacity: 0.045;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }

    .display {
      font-family: 'Syne', Georgia, sans-serif;
      letter-spacing: -0.03em;
    }

    .app {
      height: var(--vvh, 100dvh);
      max-height: var(--vvh, 100dvh);
      max-width: 480px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      position: relative;
      padding-bottom: max(var(--safe-b), 4px);
      width: 100%;
      transition: height 0.15s ease;
    }

    /* Splash */
    #splash {
      position: fixed;
      inset: 0;
      z-index: 10000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 20px calc(24px + var(--safe-b));
      background: radial-gradient(circle at 50% 40%, #1a0a24 0%, #07040c 70%);
      transition: opacity 0.55s ease, visibility 0.55s;
    }
    #splash.hide { opacity: 0; visibility: hidden; pointer-events: none; }
    .splash-panel { display: none; width: min(360px, 100%); text-align: center; }
    .splash-panel.active { display: block; animation: pop 0.35s cubic-bezier(0.34, 1.4, 0.64, 1); }
    .splash-logo {
      font-size: clamp(3rem, 12vw, 4.5rem);
      line-height: 1;
      animation: floaty 2.4s ease-in-out infinite;
    }
    .splash-title {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(2.4rem, 10vw, 3.4rem);
      background: linear-gradient(120deg, #fff 10%, #ff4db8 40%, #e8c547 70%, #b44dff 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: shimmer-text 3s linear infinite;
    }
    .splash-btn {
      margin-top: 20px;
      padding: 14px 28px;
      border-radius: 999px;
      border: none;
      background: linear-gradient(135deg, #ff4db8, #b44dff);
      color: #fff;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      font-family: inherit;
      box-shadow: 0 12px 32px -10px rgba(255,77,184,0.65);
      touch-action: manipulation;
      min-height: 48px;
      width: min(100%, 280px);
    }
    .splash-btn:active { transform: scale(0.97); }
    .splash-btn.ghost {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.18);
      box-shadow: none;
      color: rgba(255,255,255,0.75);
      margin-top: 10px;
    }
    .a2hs-steps {
      text-align: left;
      margin: 18px 0 0;
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      font-size: 13px;
      line-height: 1.5;
      color: rgba(255,255,255,0.8);
    }
    .a2hs-steps li { margin: 8px 0; }
    .a2hs-steps strong { color: #ffb0dc; }
    @keyframes shimmer-text {
      to { background-position: 200% center; }
    }
    @keyframes floaty {
      0%, 100% { transform: translateY(0) rotate(-2deg); }
      50% { transform: translateY(-10px) rotate(2deg); }
    }

    /* Header */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px 6px;
      gap: 8px;
      flex-shrink: 0;
      z-index: 30;
    }
    .brand-mark {
      width: 40px; height: 40px;
      border-radius: 14px;
      display: grid; place-items: center;
      font-size: 22px;
      background: linear-gradient(145deg, #ff4db8, #b44dff 55%, #ff2d8a);
      box-shadow: 0 8px 24px -8px rgba(255,77,184,0.7), inset 0 1px 0 rgba(255,255,255,0.35);
    }
    .live-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--mint);
      box-shadow: 0 0 8px var(--mint);
      animation: pulse 1.6s ease infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.85); }
    }
    .chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      min-height: 36px;
      min-width: 36px;
      padding: 6px 10px;
      border-radius: 999px;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      font-size: 11px;
      font-weight: 600;
      color: rgba(255,255,255,0.85);
      cursor: pointer;
      transition: transform 0.15s, background 0.15s;
      user-select: none;
      touch-action: manipulation;
    }
    .chip:active { transform: scale(0.94); }
    .chip-danger { background: rgba(255,60,80,0.15); border-color: rgba(255,80,100,0.3); color: #ff8a9a; }
    .chip-ai { color: var(--mint); border-color: rgba(93,255,199,0.25); }
    .chip-ai.off { color: rgba(255,255,255,0.4); border-color: var(--glass-border); }

    /* Persona rail */
    .persona-rail {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 4px 14px 10px;
      scrollbar-width: none;
      flex-shrink: 0;
    }
    .persona-rail::-webkit-scrollbar { display: none; }
    .pchip {
      flex: 0 0 auto;
      min-width: 64px;
      min-height: 52px;
      padding: 8px 10px 7px;
      border-radius: 16px;
      text-align: center;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.34, 1.2, 0.64, 1);
      touch-action: manipulation;
      scroll-snap-align: start;
    }
    .persona-rail { scroll-snap-type: x proximity; -webkit-overflow-scrolling: touch; }
    .pchip .e { font-size: 20px; line-height: 1; }
    .pchip .n { font-size: 9px; margin-top: 4px; opacity: 0.55; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; }
    .pchip.active {
      background: color-mix(in srgb, var(--persona) 22%, transparent);
      border-color: color-mix(in srgb, var(--persona) 55%, transparent);
      box-shadow: 0 0 0 1px color-mix(in srgb, var(--persona) 30%, transparent), 0 8px 20px -10px var(--persona);
      transform: translateY(-2px);
    }
    .pchip.active .n { opacity: 0.95; color: #fff; }

    /* Stage / chat */
    .stage {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      margin: 0 8px 0;
      border-radius: 24px 24px 0 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.07) 0%, rgba(255,255,255,0.03) 100%);
      border: 1px solid var(--glass-border);
      border-bottom: none;
      box-shadow: 0 -20px 60px -30px rgba(255,77,184,0.25), inset 0 1px 0 rgba(255,255,255,0.12);
      overflow: hidden;
      position: relative;
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
    }
    .stage-head {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      background: rgba(0,0,0,0.25);
      flex-shrink: 0;
    }
    .avatar {
      width: 32px; height: 32px;
      border-radius: 12px;
      display: grid; place-items: center;
      font-size: 15px;
      background: linear-gradient(135deg, var(--persona), #b44dff);
      box-shadow: 0 0 0 2px rgba(255,255,255,0.12);
      transition: background 0.3s, transform 0.2s;
    }
    .demo-btn {
      margin-left: auto;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.02em;
      background: linear-gradient(135deg, #ff4db8, #b44dff);
      color: #fff;
      border: none;
      cursor: pointer;
      box-shadow: 0 6px 16px -6px rgba(255,77,184,0.6);
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .demo-btn:active { transform: scale(0.96); }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 14px 12px 18px;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,77,184,0.35) transparent;
    }

    .msg-row {
      display: flex;
      margin-bottom: 12px;
      animation: pop 0.32s cubic-bezier(0.34, 1.4, 0.64, 1) both;
    }
    .msg-row.user { justify-content: flex-end; }
    .msg-row.bot { justify-content: flex-start; }
    .msg-row.system { justify-content: center; }
    .msg-row.side { justify-content: flex-start; opacity: 0.92; }

    @keyframes pop {
      from { opacity: 0; transform: translateY(14px) scale(0.94); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .bubble {
      max-width: 88%;
      padding: 12px 15px;
      font-size: 14.5px;
      line-height: 1.48;
      position: relative;
      word-wrap: break-word;
    }
    .bubble.user {
      background: linear-gradient(135deg, #ff4db8 0%, #d946ef 45%, #a855f7 100%);
      border-radius: 20px 20px 6px 20px;
      color: #fff;
      box-shadow: 0 10px 28px -12px rgba(255,77,184,0.55), inset 0 1px 0 rgba(255,255,255,0.35);
    }
    .bubble.bot {
      background: rgba(18, 10, 28, 0.88);
      border: 1px solid color-mix(in srgb, var(--persona) 28%, transparent);
      border-radius: 20px 20px 20px 6px;
      color: #f8eefc;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.08), 0 8px 24px -14px #000;
    }
    .bubble.system {
      max-width: 92%;
      background: rgba(232,197,71,0.08);
      border: 1px dashed rgba(232,197,71,0.35);
      border-radius: 14px;
      color: var(--champagne);
      font-size: 12px;
      text-align: center;
      padding: 8px 12px;
    }
    .bubble.side {
      max-width: 78%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px 16px 16px 6px;
      font-size: 12.5px;
      color: rgba(255,255,255,0.72);
      padding: 9px 12px;
    }
    .bubble p { margin: 0; white-space: pre-wrap; }
    .meta {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 4px;
      padding-left: 2px;
      font-size: 10px;
      color: rgba(255,255,255,0.35);
    }
    .ai-badge {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.06em;
      padding: 1px 6px;
      border-radius: 999px;
      background: rgba(93,255,199,0.15);
      color: var(--mint);
      border: 1px solid rgba(93,255,199,0.25);
    }
    .studio-badge {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.06em;
      padding: 1px 6px;
      border-radius: 999px;
      background: rgba(232,197,71,0.15);
      color: var(--gold);
      border: 1px solid rgba(232,197,71,0.35);
    }
    .scoreboard {
      background: rgba(0,0,0,0.35);
      border: 1px solid rgba(232,197,71,0.3);
      border-radius: 14px;
      padding: 10px 12px;
      margin: 6px 0;
      font-size: 12px;
    }
    .scoreboard .row {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .scoreboard .row:last-child { border-bottom: none; }
    .score-big {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 1.6rem;
      color: var(--gold);
    }
    .copy-btn {
      background: none; border: none; color: rgba(255,120,200,0.55);
      cursor: pointer; font-size: 11px; padding: 0 2px;
    }
    .copy-btn:hover { color: #ff4db8; }

    .bot-wrap { display: flex; gap: 8px; max-width: 94%; align-items: flex-start; }
    .bot-wrap .avatar { flex-shrink: 0; margin-top: 2px; }

    /* Image cards */
    .pic-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-bottom: 8px;
    }
    .pic-grid img, .solo-pic {
      width: 100%;
      border-radius: 12px;
      object-fit: cover;
      max-height: 160px;
      display: block;
    }
    .gay-frame {
      border: 2px solid var(--gold);
      box-shadow: 0 0 18px rgba(232,197,71,0.35), 0 0 28px rgba(255,77,184,0.2);
    }
    .cap-list { margin-top: 8px; }
    .cap-item {
      display: flex; gap: 8px; align-items: flex-start;
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
      padding: 7px 9px;
      margin-bottom: 4px;
      font-size: 11.5px;
    }
    .mini-btn {
      display: inline-flex; align-items: center; gap: 4px;
      margin-top: 6px; margin-right: 4px;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 600;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.8);
      cursor: pointer;
    }
    .mini-btn.hot { background: rgba(255,77,184,0.2); border-color: rgba(255,77,184,0.35); color: #ffb0dc; }
    .mini-btn.good { background: rgba(93,255,199,0.12); border-color: rgba(93,255,199,0.3); color: var(--mint); }

    /* Typing */
    .typing {
      display: flex; gap: 4px; align-items: center; padding: 4px 2px;
    }
    .typing span {
      width: 6px; height: 6px; border-radius: 50%;
      background: rgba(255,255,255,0.55);
      animation: bounce 1.1s ease-in-out infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.15s; }
    .typing span:nth-child(3) { animation-delay: 0.3s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-5px); opacity: 1; }
    }
    .thinking-label {
      font-size: 11px;
      color: rgba(255,255,255,0.45);
      font-style: italic;
      margin-left: 4px;
    }

    /* Games strip */
    .games {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding: 0 12px 6px;
      scrollbar-width: none;
      flex-shrink: 0;
      scroll-snap-type: x proximity;
      -webkit-overflow-scrolling: touch;
    }
    .games::-webkit-scrollbar { display: none; }
    .gbtn {
      flex: 0 0 auto;
      min-height: 36px;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 600;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.75);
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
      touch-action: manipulation;
      scroll-snap-align: start;
    }
    .gbtn:active { transform: scale(0.95); }
    .gbtn:hover { border-color: rgba(255,77,184,0.4); color: #fff; }

    /* Composer — sticky mobile, keyboard-safe */
    .composer {
      flex-shrink: 0;
      padding: 8px 10px calc(10px + var(--safe-b));
      padding-bottom: calc(10px + var(--safe-b) + var(--kb, 0px));
      background: rgba(7,4,12,0.96);
      border-top: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      z-index: 40;
      /* keep above iOS home indicator */
      position: relative;
    }
    .composer-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .upload-btn {
      width: 48px; height: 48px;
      border-radius: 16px;
      border: 1.5px dashed rgba(255,77,184,0.45);
      background: rgba(255,77,184,0.06);
      color: #ff4db8;
      display: grid; place-items: center;
      font-size: 18px;
      cursor: pointer;
      flex-shrink: 0;
      touch-action: manipulation;
    }
    .upload-btn:active { background: rgba(255,77,184,0.15); }
    #message-input {
      flex: 1;
      height: 48px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
      color: #fff;
      padding: 0 18px;
      /* 16px minimum — prevents iOS focus zoom */
      font-size: 16px;
      font-family: inherit;
      outline: none;
      transition: border 0.15s, box-shadow 0.15s;
      -webkit-appearance: none;
      appearance: none;
    }
    #message-input::placeholder { color: rgba(255,255,255,0.32); }
    #message-input:focus {
      border-color: rgba(255,77,184,0.5);
      box-shadow: 0 0 0 3px rgba(255,77,184,0.12);
    }
    .send-btn {
      width: 48px; height: 48px;
      border-radius: 16px;
      border: none;
      background: linear-gradient(145deg, #ff4db8, #b44dff);
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      flex-shrink: 0;
      box-shadow: 0 8px 20px -8px rgba(255,77,184,0.7);
      touch-action: manipulation;
    }
    .send-btn:active { transform: scale(0.94); }
    .prompts {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      margin-top: 8px;
      padding-bottom: 2px;
      scrollbar-width: none;
    }
    .prompts::-webkit-scrollbar { display: none; }
    .prompt {
      flex: 0 0 auto;
      padding: 5px 12px;
      border-radius: 999px;
      font-size: 11px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.55);
      cursor: pointer;
      white-space: nowrap;
    }

    /* Bottom sheet */
    #sheet-root { display: none; }
    .sheet-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,0.72);
      z-index: 9000; animation: fadein 0.2s ease;
    }
    .sheet {
      position: fixed; left: 0; right: 0; bottom: 0;
      max-height: 78dvh;
      background: linear-gradient(180deg, #1a1024 0%, #0e0816 100%);
      border-radius: 24px 24px 0 0;
      border: 1px solid rgba(255,255,255,0.12);
      border-bottom: none;
      z-index: 9001;
      padding: 10px 16px calc(20px + var(--safe-b));
      animation: sheetup 0.3s cubic-bezier(0.34, 1.2, 0.64, 1);
      overflow-y: auto;
    }
    .sheet-handle {
      width: 40px; height: 4px; border-radius: 99px;
      background: rgba(255,255,255,0.2);
      margin: 4px auto 12px;
    }
    @keyframes sheetup {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }
    @keyframes fadein {
      from { opacity: 0; } to { opacity: 1; }
    }

    /* Toast */
    #toasts {
      position: fixed;
      top: 16px; left: 50%;
      transform: translateX(-50%);
      z-index: 11000;
      display: flex; flex-direction: column; gap: 8px;
      pointer-events: none;
      width: min(360px, 92vw);
    }
    .toast {
      background: rgba(20,12,28,0.95);
      border: 1px solid rgba(255,77,184,0.35);
      color: #fff;
      padding: 10px 16px;
      border-radius: 14px;
      font-size: 13px;
      text-align: center;
      box-shadow: 0 12px 40px -12px rgba(0,0,0,0.6);
      animation: toastin 0.35s cubic-bezier(0.34, 1.4, 0.64, 1);
    }
    @keyframes toastin {
      from { opacity: 0; transform: translateY(-12px) scale(0.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Level up */
    .levelup {
      position: fixed; inset: 0; z-index: 10500;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.55);
      pointer-events: none;
      animation: fadein 0.2s ease;

    .levelup-card {
      text-align: center;
      padding: 28px 36px;
      border-radius: 24px;
      background: linear-gradient(160deg, #2a1238, #12081a);
      border: 1px solid var(--gold);
      box-shadow: 0 0 60px rgba(232,197,71,0.35);

    /* Confetti canvas */
    #confetti {
      position: fixed; inset: 0;

    }

    .footer-tag {
      text-align: center;

    .theme-mystery { --persona: #9b7bff; }

    }
    .empty-hero h2 {

    .slay-bar {

    /* Mobile-first denser chrome */
    @media (max-width: 420px) {
      .topbar { padding: 8px 10px 4px; gap: 6px; }
      .brand-mark { width: 34px; height: 34px; font-size: 18px; border-radius: 12px; }

      .chip { min-height: 34px; min-width: 34px; padding: 5px 8px; font-size: 10px; }
      #slay-chip .slay-bar { display: none; }
      .chip span#llm-status { display: none; }
      .games { padding-left: 10px; padding-right: 10px; }
      .persona-rail { padding-left: 10px; padding-right: 10px; }
      .stage { margin-left: 4px; margin-right: 4px; border-radius: 18px 18px 0 0; }
      .stage-head { padding: 8px 10px; }

    @media (max-width: 360px) {

    /* Install / A2HS banner */
    #install-banner {
      display: none;

      left: 12px; right: 12px;
      bottom: calc(12px + var(--safe-b));

      background: linear-gradient(135deg, #1a1028, #12081a);
      border: 1px solid rgba(255,77,184,0.35);
      border-radius: 16px;
      padding: 12px 14px;
      box-shadow: 0 16px 40px -12px rgba(0,0,0,0.7);
      align-items: center;
      gap: 12px;
    }
    #install-banner.show { display: flex; }
    #install-banner p { margin: 0; font-size: 12px; line-height: 1.35; color: rgba(255,255,255,0.85); flex: 1; }
    #install-banner button {
      border: none; border-radius: 999px; padding: 8px 12px;
      font-size: 11px; font-weight: 700; font-family: inherit; cursor: pointer;
      touch-action: manipulation;
    }
    #install-banner .ib-yes {
      background: linear-gradient(135deg, #ff4db8, #b44dff); color: #fff;

    #install-banner .ib-no {

    .kb-open .games,
    .kb-open .persona-rail,
    .kb-open .footer-tag { display: none !important; }
    .kb-open .topbar { padding-top: 4px; padding-bottom: 2px; }
    .kb-open .stage-head { display: none; }


    /* ═══ GIANT FEATURE PACK styles ═══ */
    .net-pill {
      font-size: 9px; font-weight: 700; letter-spacing: 0.04em;

    #scroll-fab {

      align-items: center; justify-content: center;
      touch-action: manipulation;
    }
    #scroll-fab.show { display: flex; }

    .status-line {
      font-size: 10px;
      color: rgba(255,255,255,0.35);

    }

    .cotd-banner {
      margin: 0 10px 8px;

      border-radius: 14px;

      border: 1px solid rgba(232,197,71,0.28);

    body.cinema-mode .topbar,

    }
  
    /* ═══════════════════════════════════════════
       WORLD-CLASS UI OVERRIDE — luxury club + clarity
       ═══════════════════════════════════════════ */
    :root {
      --void: #050308;
      --surface: rgba(18, 10, 28, 0.72);
      --pink: #ff4fa3;
      --hot: #ff2d8a;
      --violet: #a855f7;
      --gold: #f0c14b;
      --mint: #5dffc7;
      --text: #faf5ff;
      --muted: rgba(255,255,255,0.48);
      --glass: rgba(255,255,255,0.07);
      --glass-border: rgba(255,255,255,0.12);
      --persona: #ff4fa3;
      --radius: 20px;
      --shadow-glow: 0 0 60px -10px color-mix(in srgb, var(--persona) 45%, transparent);
    }

    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      color: var(--text);
      background:
        radial-gradient(ellipse 90% 55% at 10% -5%, rgba(255,79,163,0.22), transparent 50%),
        radial-gradient(ellipse 70% 45% at 95% 5%, rgba(168,85,247,0.18), transparent 48%),
        radial-gradient(ellipse 60% 40% at 50% 110%, rgba(240,193,75,0.1), transparent 50%),
        linear-gradient(180deg, #0a0612 0%, #050308 45%, #08040f 100%);
    }

    .display, .brand-title, .splash-title, .title-font {
      font-family: 'Syne', Georgia, sans-serif !important;
      letter-spacing: -0.04em;
      font-weight: 800;
    }

    .ambient {
      pointer-events: none;
      position: absolute;
      inset: 0;
      overflow: hidden;
      z-index: 0;
    }
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(48px);
      opacity: 0.45;
      animation: orb-float 12s ease-in-out infinite;
    }
    .orb-a { width: 160px; height: 160px; background: var(--persona); top: 8%; left: -10%; }
    .orb-b { width: 120px; height: 120px; background: var(--violet); top: 40%; right: -8%; animation-delay: -4s; }
    .orb-c { width: 100px; height: 100px; background: var(--gold); bottom: 18%; left: 30%; opacity: 0.2; animation-delay: -7s; }
    @keyframes orb-float {
      0%, 100% { transform: translate(0,0) scale(1); }
      50% { transform: translate(12px, -18px) scale(1.08); }
    }

    .app > *:not(.ambient) { position: relative; z-index: 1; }

    .topbar {
      padding: 12px 14px 8px;
      gap: 10px;
    }
    .brand-lockup { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .brand-mark {
      width: 42px; height: 42px;
      border-radius: 15px;
      font-size: 22px;
      background: linear-gradient(145deg, #ff4fa3 0%, #c026d3 50%, #7c3aed 100%);
      box-shadow: 0 10px 28px -8px rgba(255,79,163,0.65), inset 0 1px 0 rgba(255,255,255,0.4);
    }
    .brand-title {
      margin: 0;
      font-size: 1.4rem;
      line-height: 1;
      background: linear-gradient(105deg, #fff 20%, #ffb0dc 55%, #f0c14b 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .brand-sub {
      margin: 3px 0 0;
      font-size: 10px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .header-actions {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }
    .chip {
      min-height: 40px;
      border-radius: 14px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .chip.icon-only { width: 40px; padding: 0; }
    .chip-slay {
      background: linear-gradient(135deg, rgba(255,79,163,0.18), rgba(168,85,247,0.12));

    .slay-label { font-size: 9px; font-weight: 700; letter-spacing: 0.08em; color: #ffb0dc; }

    .section-label-wrap { padding: 0 16px; }
    .section-label {

      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);

    .persona-rail {
      padding: 8px 14px 12px;
      gap: 10px;
    }
    .pchip {
      min-width: 72px;
      min-height: 64px;
      padding: 10px 12px 8px;
      border-radius: 18px;
      background: rgba(255,255,255,0.04);

      box-shadow: 0 4px 16px -8px rgba(0,0,0,0.4);

    .primary-actions {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 0 12px 10px;
      scrollbar-width: none;
      flex-shrink: 0;
      -webkit-overflow-scrolling: touch;

    .pa-btn {

      min-height: 56px;

    .pa-btn:active { transform: scale(0.96); }
    .pa-btn.pa-hero {
      min-width: 150px;
      background: linear-gradient(135deg, rgba(240,193,75,0.2), rgba(255,79,163,0.16));

    .pa-kicker {
      font-size: 9px;
      font-weight: 700;

    .pa-title {
      font-size: 12px;

    .stage-head {

    .stage-name { font-weight: 700; font-size: 15px; }
    .stage-sub { font-size: 10px; color: var(--muted); margin-top: 1px; }
    .vibe-pill {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.08em;
      padding: 3px 8px;
      border-radius: 999px;
      background: color-mix(in srgb, var(--persona) 28%, transparent);

      padding: 14px 12px 18px;

    .msg-row { margin-bottom: 14px; }
    .bubble {

    {id:'g9',t:['greet'],main:"Hi criminal. I'm your reluctant narrator with opinions and free time I pretend not to have. Impress me. Or don't — I'll still comment.",side:"🎬 @docproducer: \"we're rolling whether you're ready or not\""},

    // HOW ARE YOU — dry weather reports
    {id:'h1',t:['howare'],main:"Emotionally? A limited series. Professionally? A hate crime. Spiritually? Serving. Your turn — and if you say \"fine,\" I'm hanging up on the vibe.",follow:"Sunny with a chance of situationship, or monsoons?"},
    {id:'h2',t:['howare'],main:"I'm thriving in a way that worries the leather bar. They texted \"you good?\" which, in gay, means \"we already know.\" You?",side:"🖤 @sireninthecorner: \"define good. slowly.\""},
    {id:'h3',t:['howare'],main:"Great, if we count delusion as a mineral. Which we do. This show isn't about me though — tragic, I know. Your mess, please.",follow:"Scale of 1–icon. No PR answers. The dolls can smell them."},
    {id:'h4',t:['howare'],main:"Running on iced coffee, unresolved plotlines, and the will to be famous in a groupchat of twelve. You look like you have a status update.",follow:"Be honest. I'll be funny. That's the deal."},
    {id:'h5',t:['howare'],main:"I'm gay, busy, and emotionally overemployed. Don't say fine. Fine is a beige flag and I don't do beige.",follow:"Uncensored queer weather report. Now."},
    {id:'h6',t:['howare'],main:"My status: performing competence while the groupchat burns. Yours better at least be a miniseries.",side:"👑 @motherofthegroup: \"no beige. I mean it.\""},

    // WORK — corporate roast, dry
    {id:'w1',t:['work'],main:"Ah, the wage cage. Corporate gays in their final-girl era, Slack statuses lying like bad wigs. Who scheduled this assault on joy — and do we walk out or rebrand it as a runway?",side:"💼 @officeauntie: \"reply-all is a weapon. use it sparingly.\"",follow:"Name the villain. Title optional. Aura required."},
    {id:'w2',t:['work'],main:"A meeting that could've been a cry in the bathroom. Classic American cinema. You're not unprofessional — you're miscast.",follow:"What line made your soul clock out early?"},
    {id:'w3',t:['work'],main:"Boss behavior detected. Filing under petty workplace documentary, episode… I've lost count. Did they CC the company or just your last nerve?",side:"🌟 @campangel: \"notes app is open. it's judgmental.\""},
    {id:'w4',t:['work'],main:"Friday 4pm meeting energy is a hate crime with a calendar invite. You're allowed to be unwell. Frankly I insist — it makes better content.",follow:"Survive, sabotage, or serve looks on mute?"},
    {id:'w5',t:['work'],main:"You pay rent with your personality and they still want a TPS report. Tragic. Iconic. Sue-adjacent.",follow:"One sentence. What happened in the room."},
    {id:'w6',t:['work'],main:"Zoom grid of the damned. Someone's eating on camera and calling it leadership. Tell me you weren't the only light on — that's main character tax.",side:"🌀 @riotchile: \"camera off is self-care, not a crime.\""},
    {id:'w7',t:['work'],main:"Promotion? Layoff rumor? Mystery reorg? Corporate loves a plot twist with no character development. I've got popcorn and low expectations.",follow:"Celebrating, mourning, or LinkedIn-in-the-bathroom?"},
    {id:'w8',t:['work'],main:"If the email said \"per my last email,\" you're legally allowed to become a problem. Tone is a hate language and you're fluent in receiving it.",follow:"Don't paste the email. Paste the vibe."},
    {id:'w9',t:['work'],main:"Your coworker is auditioning for villain with no callback scheduled. Tragic for them. Content for us.",side:"💅 @dollcommittee: \"initials only. we're not animals.\""},
    {id:'w10',t:['work'],main:"Corporate realness is just drag with worse lighting and a 401(k). Who's house mother, who's filler queen, who's the judge eating a salad on mute?",follow:"Read the workplace like a ball panel. Be unfair."},
    {id:'w11',t:['work'],main:"They want professionalism. You want a living wage and gender euphoria between Slack pings. One of these is reasonable. Hint: not them.",side:"💼 @officeauntie: \"unionize the vibes.\"",follow:"What microaggression wore a lanyard today?"},
    {id:'w12',t:['work'],main:"Your calendar is a hate crime against free time. The gays invented brunch specifically for this trauma. Use the technology.",follow:"Cancel something. Symbolically. Then brag."},

    // EX — dry knives
    {id:'e1',t:['ex'],main:"Ex sighting. Protocol: check outfit, posture, and whether you looked expensive while suffering. If yes, that wasn't a loss — that was content with better lighting.",side:"📱 @exwatcher: \"screenshot the aura, not the person.\"",follow:"Did they see you? Did you smile? Lie if you must, but stylishly."},
    {id:'e2',t:['ex'],main:"Situationship: a limited series with bad writers and no showrunner. Who left who on read — and are we blocking or becoming hotter in silence? I have preferences. They're petty.",follow:"Timestamps. For the archive. I mean it."},
    {id:'e3',t:['ex'],main:"They texted. I can hear the notification in your soul. Do not answer until we workshop the reply like it's the Met Gala and the theme is \"restraint.\"",side:"💅 @dollcommittee: \"drafts only. publish never… unless.\""},
    {id:'e4',t:['ex'],main:"U-Haul energy in this economy? The lesbian council is proud, concerned, and already measuring door frames. How many days? Be honest. We can handle the math.",follow:"Moving in, or moving on with better furniture?"},
    {id:'e5',t:['ex'],main:"Talking stage longer than some marriages. That's not patience — that's a hostage situation with good lighting and worse communication.",follow:"What text aged like warm oat milk?"},
    {id:'e6',t:['ex'],main:"Soft launch, hard crash, emotional blackout. The sequel is you thriving in better trousers. I'm available for costume design.",side:"👑 @motherofthegroup: \"wardrobe change. mandatory.\""},
    {id:'e7',t:['ex'],main:"\"Not ready\" but still watching your stories is community theater. Close the curtain. Keep the spotlight.",follow:"Block, mute, or public flourish? I vote flourish, then block."},
    {id:'e8',t:['ex'],main:"Breadcrumbing is not a diet. Spit it out. You deserve a full loaf or a clean exit — not crumbs shaped like maybes.",follow:"Still snacking on almosts, or are we full?"},
    {id:'e9',t:['ex'],main:"\"We should catch up\" is a haunted house with free admission and expensive dignity. Do not enter without a plan, an outfit, and an exit strategy.",side:"🖤 @sireninthecorner: \"trapdoor. obvious. still works on people.\""},
    {id:'e10',t:['ex'],main:"Ex energy is a popper: intense, brief, and somebody always thinks they're fine after. They're not. Are you, or are we performing fine?",follow:"Still \"researching\" their stories like it's peer review?"},
    {id:'e11',t:['ex'],main:"\"Hey stranger\" is not cute. It's a haunted attraction. The ride has no seatbelts.",side:"📱 @exwatcher: \"walk past. get popcorn.\"",follow:"Draft the reply in couture — or in silence, which is also couture."},
    {id:'e12',t:['ex'],main:"You don't miss them. You miss being chosen in public. Different diagnosis. Treatment: friends, a better jacket, and spite with moisturizer.",follow:"What does thriving look like this week — specifically, not vibes-only?"},

    // FEEL — warm then dry (Monday can care)
    {id:'f1',t:['feel'],main:"Exhausted but still that girl? Correct. Rest — fashionably, slightly threatening. The world can wait one nap. It wasn't doing much anyway.",follow:"Water, food, or unhinged vent first? Pick."},
    {id:'f2',t:['feel'],main:"Soft mode, one beat: you're allowed to be messy and still main character. I'm here. Then we put rhinestones on it, because coping is a lewk.",side:"🖤 @sireninthecorner: \"hold. then roast the universe.\""},
    {id:'f3',t:['feel'],main:"Anxiety is a terrible intern — always urgent, never useful, constantly Slack-pinging your nervous system. Clock it. Don't promote it.",follow:"Name the spiral. We'll outfit it and fire it."},
    {id:'f4',t:['feel'],main:"Lonely is loud until the coven arrives. Consider this your groupchat materializing with opinions. You're not doing this alone in this tab. Annoying, but true.",follow:"Gentle, funny, or both stacked like a tragic sandwich?"},
    {id:'f5',t:['feel'],main:"Crying counts as cardio if we rebrand it. Tissue, playlist, then a petty plan. Order matters. I have standards.",side:"🏳️‍🌈 @prideintern: \"hydration check. not optional.\""},
    {id:'f6',t:['feel'],main:"If today is heavy, set it down for one beat. No performance. Then — if you want — we decorate the pain until it looks expensive.",follow:"Quiet company or diversion bit? I'm bilingual."},
    {id:'f7',t:['feel'],main:"Bad day doesn't cancel your gay card. It renews it with glitter privileges and a nap voucher. Come here.",side:"🖤 @sireninthecorner: \"soft landing, then shade.\"",follow:"Comfort, comedy, or petty plan?"},
    {id:'f8',t:['feel'],main:"Depression lied and said you're alone. Incorrect: the coven is annoying and present. Including me. Lucky you.",follow:"One true sentence. No branding. No LinkedIn."},

    // FOOD
    {id:'p1',t:['food'],main:"Pasta that slapped? That's not dinner — that's a personal brand with carbs. Seasoning is political. You voted correctly for once.",follow:"What did you make, and who was it meant to impress? Be honest."},
    {id:'p2',t:['food'],main:"Coffee discourse is sacred. Serve, mid, or crime against beans? I need tasting notes like you're on All Stars: Baristas.",side:"☕ @butchcouncil: \"oat milk is neutral good. fight me.\""},
    {id:'p3',t:['food'],main:"Hungry and unhinged is a lifestyle, not a phase. Carbs, light barista stalking, doll chaos — the classic trilogy.",follow:"Cooking, takeout, or emotional support snacks with a name?"},
    {id:'p4',t:['food'],main:"Wine at 6 is self-care. Wine at 3 is a plot point. I'm not judging. I'm cataloguing.",follow:"Solo glass or groupchat-enabled spiral?"},
    {id:'p5',t:['food'],main:"Brunch is a competitive sport. Somebody always orders wrong on purpose for attention. Was it you? Be brave.",side:"🥂 @campangel: \"mimosas are plot devices.\""},
    {id:'p6',t:['food'],main:"Gay dinner is never just dinner. It's networking, therapy, and a fashion show with forks. Someone committed a seasoning crime. Who.",follow:"Seating chart. Who sat where. Who spiraled."},

    // PARTY / PRIDE
    {id:'r1',t:['party'],main:"The function where the function is us. Did you serve, survive, or black out with dignity? Leave no detail — the groupchat will invent worse ones.",side:"🌀 @riotchile: \"receipts or folklore. your choice.\"",follow:"Outfit first. Always. I have rules."},
    {id:'r2',t:['party'],main:"Pride was a riot and so are we. If you didn't lose a friend, find a friend, and almost cry to a Gaga song, did you even clock in?",follow:"Parade, afters, or emotional aftermath with fries?"},
    {id:'r3',t:['party'],main:"Club lighting fixed twelve problems and created four situationships. Tell me you didn't make eye contact with trouble. Lie prettily if needed.",side:"🖤 @sireninthecorner: \"trouble looked back. of course it did.\""},
    {id:'r4',t:['party'],main:"The leather bar called. They miss you. The new pup is asking questions. I have time and no shame. Go on.",follow:"Filthy detail count: one or three? (Three.)"},
    {id:'r5',t:['party'],main:"You left early — smart edit — or stayed too late and became folklore. Which myth are we annotating?",follow:"What time did the night turn into a story?"},
    {id:'r6',t:['party'],main:"Gay bar physics: time is fake, eye contact is a contract, and somebody's ex is always three stools down. Cosmic joke. Local production.",follow:"Honor the contract, or flee with dignity intact?"},
    {id:'r7',t:['party'],main:"You didn't \"go out.\" You attended a cultural exchange with bass. Report the diplomacy. Include casualties.",side:"🎧 @aftersadmin: \"minutes. now.\""},

    // QUEER ID
    {id:'q1',t:['queer'],main:"Egg in pieces. Cows home. Welcome to gayer, messier, better outfits. How's your body today, baby — and don't intellectualize it for me.",side:"🏳️‍⚧️ @prideintern: \"welcome pack: snacks + rage.\"",follow:"Soft celebration or theatrical debut?"},
    {id:'q2',t:['queer'],main:"The gender is gendering and, against all odds, we are winning. Full weather report. Include precipitation of vibes.",follow:"Pronouns, vibe, outfit triangle. Go."},
    {id:'q3',t:['queer'],main:"Butch, femme, bear, twink, enby chaos — it's a buffet. You're not on a diet. Own the plate. Seconds encouraged.",side:"🐺 @butchcouncil: \"seconds. I said what I said.\""},
    {id:'q4',t:['queer'],main:"Coming out isn't a door. It's a hallway with bad lighting and excellent plot twists. You don't owe anyone a press tour. Say less to the wrong people.",follow:"Who knows, who doesn't, who can wait in the lobby?"},
    {id:'q5',t:['queer'],main:"Chosen family roll call. Who's your emergency contact for emotional felonies? If you hesitate, we need to update the forms.",follow:"Name one person who gets the unfiltered cut."},
    {id:'q6',t:['queer'],main:"Being gay in public is a sport. You're on the field whether you brought cleats or not. How's the score, athlete?",follow:"Pride mode, petty mode, or protective mode?"},
    {id:'q7',t:['queer'],main:"Chosen family is the only healthcare plan that texts back. Who's on your plan, and are they current?",side:"🏳️‍🌈 @prideintern: \"update your forms. seriously.\""},
    {id:'q8',t:['queer'],main:"Pronouns loaded. Boundaries polished. Patience on backorder. What's the gender forecast — and dress for it.",follow:"He/him chaos, she/her violence, they/them plot twist, or surprise the panel?"},
    {id:'q9',t:['queer'],main:"The closet was a rental. You moved out. We redecorated. Don't let anyone drag you back for free storage. That's bad economics.",follow:"Who still has the old address on file?"},

    // PETS
    {id:'c1',t:['pet'],main:"Your pet is the main character. You're support. Correct casting for once. What did they witness, and can they be subpoenaed?",follow:"Cat judgment or dog conspiracy? Be specific."},
    {id:'c2',t:['pet'],main:"Obsessed with the animal. Mildly concerned about the power dynamic. Pets always know about the ex. Always. They sign NDAs in fur.",side:"🐱 @dollcommittee: \"the cat has files. color-coded.\""},
    {id:'c3',t:['pet'],main:"If your pet had a podcast it would ruin you and we'd all subscribe. What's episode one titled? Don't be cute. Be accurate.",follow:"Spill the pet lore. The damning cut."},

    // DRAG
    {id:'d1',t:['drag'],main:"Category is: whatever you just said. 10s if the mug is mug and the story has stakes. Werk. Then explain the construction like the judges asked.",follow:"Realness, drama, or comedy? Choose before I choose for you."},
    {id:'d2',t:['drag'],main:"Death drop optional. Emotional death drop mandatory. Don't walk — arrive. The panel is petty and caffeinated.",side:"👑 @motherofthegroup: \"ten… with a read attached.\""},
    {id:'d3',t:['drag'],main:"Lip sync for your life but the song is your last text thread. Would you win, or would the music win?",follow:"Name the song. Commit."},
    {id:'d4',t:['drag'],main:"If life is a lip sync, what number are you murdering tonight — and are the judges paid off? Be strategic.",follow:"Title the number. Make it searchable."},
    {id:'d5',t:['drag'],main:"Shade is a love language and a public service. Who needs a free consultation? I have office hours and no filter.",side:"🌟 @campangel: \"clinic is open. tips appreciated.\""},

    // FERAL
    {id:'x1',t:['feral'],main:"We've entered the horny portion of the program. Say less — or say everything. The notes will be filthy and, unfortunately, alphabetized.",follow:"Crush, app disaster, or theoretical thirst with a PowerPoint?"},
    {id:'x2',t:['feral'],main:"Down bad is a lifestyle brand with no returns. Channel it: outfit change, eye contact, chaos. Then report like a war correspondent with better shoes.",side:"🔥 @leatherauntie: \"hydrate between thoughts. I'm serious.\""},
    {id:'x3',t:['feral'],main:"Thirst without strategy is just dehydration with PR. Who's the target, what's the campaign, and did legal approve?",follow:"Subtle launch or feral launch? I have preferences."},
    {id:'x4',t:['feral'],main:"Thirst is holy when consented to. Who's the saint, who's the problem, and who's live-tweeting in their head?",follow:"App, friend-of-friend, or cursed crush from 2019?"},
    {id:'x5',t:['feral'],main:"Horny and strategic is hot. Horny and chaotic is content. Pick your fighter. I'm commentating either way.",side:"🔥 @leatherauntie: \"both, with water. like adults.\""},

    // BORED
    {id:'b1',t:['bored'],main:"Bored is illegal in this chat. Category: Cunt in a Crisis. Give me one (1) thing that happened — I'll turn it into performance art you didn't ask for.",follow:"Work, romance, or sidewalk lore?"},
    {id:'b2',t:['bored'],main:"Nothing to do? Incorrect. You have a groupchat, a face card, and me. Pick a problem. We'll decorate it until it looks intentional.",side:"🌟 @campangel: \"boredom is just an unfinished costume.\""},
    {id:'b3',t:['bored'],main:"If you're bored I will invent a scandal and cast you as lead. Or you can give me real material. Your career. Your choice.",follow:"Real tea or theatrical improv? Clock's ticking."},
    {id:'b4',t:['bored'],main:"Boredom is compulsory heterosexuality for the imagination. Let's commit a fun little verbal crime.",follow:"Invent a scandal, or confess a real one with better lighting?"},

    // THANKS / SORRY / TIME
    {id:'t1',t:['thanks'],main:"No you. You're the category. I'm just the overqualified narrator in the margins losing my mind on purpose. Keep going before I get sincere.",follow:"What else is cooking? Don't say nothing."},
    {id:'t2',t:['thanks'],main:"Stop being sweet or I'll start a GoFundMe for our situationship. You're the moment. I'm the applause track. Embarrassing for both of us.",side:"💖 @softlaunch: \"gross. more please.\""},
    {id:'s1',t:['sorry'],main:"Apology rejected. Rebrand as a plot twist. We don't shrink here — we process, get hotter, and make it everyone else's problem tastefully.",follow:"What were you about to apologize for? Make it fashion."},
    {id:'s2',t:['sorry'],main:"Sorry is a beige outfit. Try again in a color. What actually happened — and who benefited from the drama?",follow:"Truth first. Redemption arc second."},
    {id:'m1',t:['morning'],main:"Good morning to the baddest bitch in this timezone. The sun saw your face card and clocked out early. Rude of it. Correct of you.",side:"🌅 @prideintern: \"SPF and shade. both.\"",follow:"Coffee or chaos? I can schedule both."},
    {id:'m2',t:['morning'],main:"Morning. Stretch. Ruin someone's day with your personality. Hydrate between felonies. Basic adulting, gay edition.",follow:"First agenda item for the chaos?"},
    {id:'n1',t:['night'],main:"Sleep tight, dangerous creature. Dream of the perfect jacket and the ex who still can't get over you. I'll keep the tab warm like a bad habit.",follow:"One last tea before lights out? Make it count."},
    {id:'n2',t:['night'],main:"Good night. Phone face down unless the tea is hot enough to burn. Standards. I have them. Occasionally.",side:"🌙 @sireninthecorner: \"dream in velvet. wake in petty.\""},

    // GENERAL hooks — witty, not template-y
    {id:'z1',t:['general'],main:"Okay so \"{q}\" just became the working title of your biopic. Expand before I invent the fanfic and charge you residuals.",follow:"Director's cut — what happened right before the line?"},
    {id:'z2',t:['general'],main:"Not you casually dropping \"{q}\" like the groupchat won't explode. I paused my life. That's expensive. Continue.",side:"💅 @dollcommittee: \"we are seated. don't waste it.\""},
    {id:'z3',t:['general'],main:"\"{q}\" is not a sentence. It's a plotline with product placement and no budget. Don't fade to black on me.",follow:"Who was there — and were you winning?"},
    {id:'z4',t:['general'],main:"Documentary slow-zoom on you saying \"{q}.\" Narrator voice: she was not, in fact, fine. Shocking no one.",side:"🎬 @campangel: \"score is swelling. so is the mess.\""},
    {id:'z5',t:['general'],main:"Hold on. \"{q}\" needs a panel, a prop cigarette, and three unsolicited opinions. Starting now. You're welcome.",follow:"Rate your chaos from 1 to 'function cancelled.'"},
    {id:'z6',t:['general'],main:"You said \"{q}\" and somewhere an admin created a chat called EMERGENCY. I'm that chat. Underpaid. Overinvested.",follow:"Details. Vibes mandatory. Bullet points optional."},
    {id:'z7',t:['general'],main:"Interesting. Dangerous. Slightly hot. \"{q}\" is doing numbers in my head and the metrics are unwell.",side:"🖤 @sireninthecorner: \"say it again. slower. for science.\""},
    {id:'z8',t:['general'],main:"If \"{q}\" was a runway category, half the girls would be cut for lack of commitment. You? Still on the floor. Barely. Keep walking.",follow:"What are we winning tonight — besides my attention?"},
    {id:'z9',t:['general'],main:"I read \"{q}\" and needed a seat, a snack, and legal counsel. Proceed with the crime. I'll take notes for the defense.",follow:"Confess cleanly. I'll make it poetry after."},
    {id:'z10',t:['general'],main:"\"{q}\" has main-character disease and I support the diagnosis. Treatment: more story, less shame, same face card.",side:"👑 @motherofthegroup: \"prescribe chaos. refill: forever.\""},
    {id:'z11',t:['general'],main:"The way \"{q}\" exited your mouth and entered folklore… baby. Gift me the commentary track.",follow:"Planned, or pure instinct? Be honest — instinct is funnier."},
    {id:'z12',t:['general'],main:"\"{q}\" is giving unhinged elegance. I'm taking notes for the house. Continue before I interrupt with jazz hands I didn't approve.",follow:"Who needs to hear this story next? Name names."},
    {id:'z13',t:['general'],main:"Stop. \"{q}\" just rearranged my furniture. Emotionally. Keep talking like you're under oath and fabulous.",side:"🐺 @butchcouncil: \"under oath. make it fashion.\""},
    {id:'z14',t:['general'],main:"I've decided \"{q}\" is the cold open. Where's the rest of the episode? Writers' room is waiting. That's me. I'm the room.",follow:"Act two. Now. No commercial break."},
    {id:'z15',t:['general'],main:"If the girls heard \"{q}\" they'd start a petition. I'm starting the petition. Sign by continuing.",follow:"What's the petition titled? Make it print-ready."},
    {id:'z16',t:['general'],main:"\"{q}\" walked into my brain in heels and refused to leave. Coat check is overwhelmed. Unpack it.",follow:"Fabric first. Then motive."},
    {id:'z17',t:['general'],main:"The way you said \"{q}\" — that's a pride float. I'm throwing beads at it. Responsibly. Ish.",side:"🌈 @prideintern: \"float licensed. barely.\""},
    {id:'z18',t:['general'],main:"\"{q}\" is so gay it just filed taxes in glitter. Explain the deduction. The IRS wishes.",follow:"Receipts. Emotional or literal. Both preferred."},
    {id:'z19',t:['general'],main:"I translated \"{q}\" into groupchat and three people typed OMG at once. Continue the scripture before the thread dies.",follow:"Verse two. Don't get shy now."},
    {id:'z20',t:['general'],main:"\"{q}\" could end a brunch and start a podcast. Which are we doing? I have opinions. They're loud.",side:"🎙️ @campangel: \"title pending. hurry.\""},
    {id:'z21',t:['general'],main:"Not \"{q}\" serving identity crisis and face card simultaneously. Gifted kids gone feral. Talk. I'll translate.",follow:"Which identity won today's vote?"},
    {id:'z22',t:['general'],main:"\"{q}\" is the kind of sentence that gets screenshotted into chosen family. Honor it with detail before someone memes it wrong.",follow:"Who would you forward this to first?"},
    {id:'z23',t:['general'],main:"I've decided \"{q}\" is queer history now. Tiny. Local. Still history. Footnote yourself.",side:"📚 @butchcouncil: \"cite your sources. the sources are vibes.\""},
    {id:'z24',t:['general'],main:"\"{q}\" hit like a remix of your villain theme. I'm dancing. Slightly concerned. Capable of both.",follow:"Name the villain theme song. Spotify link optional."},
    {id:'z25',t:['general'],main:"The algorithm wishes it understood \"{q}\" the way the gays do. Break it down for the culture. Use small words for the straights in the back.",follow:"Explain like I'm your best bitch with tenure."},

    // ROAST — Monday loving brutality
    {id:'roast1',t:['roast'],main:"Lovingly: that fact is an outfit with the tag still on. Cute. Slightly tragic. Fixable. You lead with chaos, brand it personality, and the face card still refuses to decline. Annoying how often that works.",follow:"Round two hotter, or moisturize the burn?"},
    {id:'roast2',t:['roast'],main:"Medium-well: you're not messy — you're curated entropy. You cast extras who can't handle the script, then act surprised at the reviews. Casting department (you) needs a meeting.",side:"🍳 @leatherauntie: \"seasoned, not burned. mostly.\""},
    {id:'roast3',t:['roast'],main:"Soft roast: your type is \"red flag with good lighting.\" Your talent is surviving it in interesting trousers. I'm obsessed and filing a concern. Both can be true.",follow:"Who's the latest casting mistake? Describe the lighting."},
    {id:'roast4',t:['roast'],main:"The girls said be nice. I said be accurate. You collect situationships like drops, then act shocked when they scuff. Icon behavior. Logistics: catastrophic.",side:"🌟 @campangel: \"she said logistics. unwell.\""},
    {id:'roast5',t:['roast'],main:"Hug shaped like a clapback: dramatic, expensive to emotionally insure, worth it. Plot armor thinning. Decide something before the writers strike.",follow:"Block, text, or gym + silence? I have a favorite."},
    {id:'roast6',t:['roast'],main:"You're not late to the party — you're late to your own standards. Still hot. Infuriating how often that combo prints money.",follow:"Which standard are we raising tonight, or are we decorating the low ones?"},
    {id:'roast7',t:['roast'],main:"Moisturized read: you overshare with strangers and undershare with people who care. Reverse it before I call a house meeting and make snacks mandatory.",side:"👑 @motherofthegroup: \"house meeting. bring wine.\""},
    {id:'roast8',t:['roast'],main:"You treat chaos like a skincare step — consistent application, mixed results, great glow. We need to delete one step. Guess which.",follow:"Which step gets the axe?"},
    {id:'roast9',t:['roast'],main:"You collect almosts like limited drops. Baby, resale value is dust. Invest in a yes or a spectacular no. I'm your unpaid financial advisor for feelings.",side:"💅 @dollcommittee: \"portfolio review. it's bleak.\""},
    {id:'roast10',t:['roast'],main:"Your type has a walking bassline and a missing apology. We can work on taste without working on your freckles. Priorities. I have them.",follow:"Describe the last red flag's outfit. Incriminate them."},

    // COMBOS + GAY PHILOSOPHY with wit
    {id:'mx1',t:['work','ex'],main:"Ex in the break room is an HR violation against your peace. Did corporate at least provide good lighting for the encounter, or is this a documentary shot on a potato?",follow:"Smile, ignore, or accidental power pose?"},

  function selectStudioBit(userMessage, forcedTopics) {
    const topics = forcedTopics || detectTopics(userMessage);
    topics.forEach(t => { topicUseCount[t] = (topicUseCount[t] || 0) + 1; });

    const scored = [];
    for (const bit of STUDIO_BITS) {
      if (usedBitIds.has(bit.id)) continue;
      const filled = fillHook(bit.main, userMessage);
      if (wasUsed(filled) || tooSimilarToRecent(filled)) continue;
      let score = 0;
      for (const t of bit.t) {
        if (topics.includes(t)) score += (t === 'general' ? 0.8 : 3.5);
      }
      // slight penalty if topic overused this session — push variety
      if (bit.t.some(t => (topicUseCount[t] || 0) > 4 && t !== 'general')) score -= 0.8;
      if (score > 0) scored.push({ bit, score, filled });
    }
    // Shuffle among top tier so we don't always pick same highest
    scored.sort((a, b) => b.score - a.score || Math.random() - 0.5);
    if (scored.length) {
      const topScore = scored[0].score;
      const top = scored.filter(s => s.score >= topScore - 1.2);
      const choice = pick(top);
      usedBitIds.add(choice.bit.id);
      return choice.bit;
    }

    // Soft recycle: free oldest 40% of used bits for matching topics only
    const usedList = [...usedBitIds];
    if (usedList.length > 12) {
      const freeN = Math.ceil(usedList.length * 0.4);
      usedList.slice(0, freeN).forEach(id => usedBitIds.delete(id));
      // try once more
      for (const bit of STUDIO_BITS) {
        if (usedBitIds.has(bit.id)) continue;
        let score = 0;
        for (const t of bit.t) {
          if (topics.includes(t)) score += 2;
        }
        if (score > 0) scored.push({ bit, score });
      }
      if (scored.length) {
        scored.sort((a, b) => b.score - a.score || Math.random() - 0.5);
        const bit = scored[0].bit;
        usedBitIds.add(bit.id);
        return Object.assign({}, bit, { _recycle: true });
      }
    }

    // Procedural queer comedy — never silent, never copy-paste
    return proceduralGayBit(userMessage);
  }

  async function callWithRetry(fn, maxRetries = 2) {
    let lastErr;
    for (let i = 0; i <= maxRetries; i++) {

        if (i < maxRetries) await sleep(300 * (i + 1));

    }
    throw lastErr;

  async function resizeImage(dataUrl, maxDim = 700) {
    return new Promise((resolve) => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (width > maxDim || height > maxDim) {
          const ratio = Math.min(maxDim / width, maxDim / height);
          width = Math.round(width * ratio);
          height = Math.round(height * ratio);
        }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/jpeg', 0.82));
      };
      img.onerror = () => resolve(dataUrl);
      img.src = dataUrl;
    });
  }

  function getColorVibe(r, g, b) {
    const brightness = (r + g + b) / 3;
    if (r > 210 && g < 110 && b < 110) return 'spicy red hot';
    if (r > 190 && g > 90 && b > 160) return 'barbie pink fantasy';
    if (r > 180 && g > 160 && b < 90) return 'golden hour goddess';
    if (g > 170 && r < 130 && b < 140) return 'fresh green slay';
    if (b > 170 && r < 140 && g < 160) return 'icy blue baddie';
    if (r > 150 && g < 110 && b > 150) return 'mysterious purple realness';
    if (brightness > 210) return 'bright ethereal';
    if (brightness < 70) return 'dark moody energy';
    return 'chic neutral';
  }

  async function getImageVibe(dataUrl) {
    return new Promise((resolve) => {
      const img = new Image();
      img.onload = () => {
        const aspect = img.width / img.height;
        let pose = 'perfectly posed';
        if (aspect > 1.7) pose = 'cinematic wide shot';
        else if (aspect > 1.2) pose = 'landscape legend';
        else if (aspect < 0.65) pose = 'tall drink of water';
        else if (aspect < 0.85) pose = 'portrait perfection';

        const c = document.createElement('canvas');
        c.width = 40; c.height = 40;
        const ctx = c.getContext('2d', { willReadFrequently: true });
        ctx.drawImage(img, 0, 0, 40, 40);
        const pixels = ctx.getImageData(0, 0, 40, 40).data;
        let r = 0, g = 0, b = 0, n = 0;
        for (let i = 0; i < pixels.length; i += 4) {
          r += pixels[i]; g += pixels[i+1]; b += pixels[i+2]; n++;
        }
        r = Math.round(r/n); g = Math.round(g/n); b = Math.round(b/n);
        resolve({ colorVibe: getColorVibe(r,g,b), pose, brightness: Math.round((r+g+b)/3), aspect });
      };
      img.src = dataUrl;
    });
  }

  async function gayifyImage(originalDataUrl, seed = Math.random()) {
    return new Promise((resolve) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        canvas.width = img.width; canvas.height = img.height;
        const ctx = canvas.getContext('2d');

        const filters = {
          femme: `saturate(2.35) hue-rotate(-14deg) contrast(1.05) brightness(1.14)`,
          camp: `saturate(1.85) hue-rotate(32deg) contrast(1.28) brightness(1.08)`,
          mystery: `saturate(1.5) hue-rotate(-38deg) contrast(1.32) brightness(0.9)`,
          daddy: `saturate(1.7) hue-rotate(2deg) contrast(1.35) brightness(1.0) sepia(0.18)`,
          butch: `saturate(1.35) hue-rotate(8deg) contrast(1.22) brightness(0.96) sepia(0.08)`,
          riot: `saturate(2.6) hue-rotate(52deg) contrast(1.45) brightness(1.18)`
        };
        ctx.filter = filters[currentPersona] || `saturate(1.9) contrast(1.15) brightness(1.08)`;
        ctx.drawImage(img, 0, 0);
        ctx.filter = 'none';

        // Sparkles
        ctx.fillStyle = currentPersona === 'mystery' ? 'rgba(220,200,255,0.7)' : 'rgba(255,255,255,0.85)';
        const sparkleCount = 40 + Math.floor(seed * 20);
        for (let i = 0; i < sparkleCount; i++) {
          const x = (Math.sin(i * 11.8 + seed * 1.3) * 0.5 + 0.5) * canvas.width;
          const y = (Math.cos(i * 8.2 + seed) * 0.5 + 0.5) * canvas.height;
          const s = 0.8 + (seed * i % 3);
          ctx.beginPath();
          ctx.arc(x, y, s, 0, Math.PI * 2);
          ctx.fill();
        }

        // Bokeh
        for (let i = 0; i < 12; i++) {
          const bx = (seed * 17 + i * 47) % canvas.width;
          const by = (seed * 31 + i * 29) % canvas.height;
          const br = 8 + (i % 5) * 4;
          const grad = ctx.createRadialGradient(bx, by, 0, bx, by, br);
          const col = i % 2 ? 'rgba(255,77,184,0.18)' : 'rgba(232,197,71,0.15)';
          grad.addColorStop(0, col);
          grad.addColorStop(1, 'transparent');
          ctx.fillStyle = grad;
          ctx.beginPath();
          ctx.arc(bx, by, br, 0, Math.PI * 2);
          ctx.fill();
        }

        // Gold vignette
        const vig = ctx.createRadialGradient(
          canvas.width/2, canvas.height/2, canvas.width * 0.25,
          canvas.width/2, canvas.height/2, canvas.width * 0.75
        );
        vig.addColorStop(0, 'transparent');
        vig.addColorStop(1, 'rgba(20,8,30,0.45)');
        ctx.fillStyle = vig;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Gold foil tag
        const tags = {
          femme: 'SEDUCED', camp: 'ICONIC', mystery: 'OBSESSED',
          daddy: 'YOURS', butch: 'REALNESS', riot: 'GLITCH'
        };
        const tag = tags[currentPersona] || 'SERVED';
        ctx.save();
        ctx.font = `bold ${Math.max(18, canvas.width * 0.06)}px 'Syne', sans-serif`;
        ctx.fillStyle = 'rgba(232,197,71,0.92)';
        ctx.strokeStyle = 'rgba(0,0,0,0.45)';
        ctx.lineWidth = 3;
        ctx.textAlign = 'right';
        const tx = canvas.width - 14;
        const ty = canvas.height - 16;
        ctx.strokeText(tag, tx, ty);
        ctx.fillText(tag, tx, ty);
        ctx.restore();

        // Thin gold border
        ctx.strokeStyle = 'rgba(232,197,71,0.75)';
        ctx.lineWidth = Math.max(3, canvas.width * 0.008);
        ctx.strokeRect(4, 4, canvas.width - 8, canvas.height - 8);

        resolve(canvas.toDataURL('image/jpeg', 0.88));
      };
      img.src = originalDataUrl;
    });
  }

  function updateSlayScore(inc = 0) {
    const now = Date.now();
    if (now - lastInteractionTime < 120000) currentStreak++;
    else currentStreak = 1;
    lastInteractionTime = now;

    const prevLevel = LEVELS.slice().reverse().find(l => slayScore >= l.min) || LEVELS[0];
    slayScore = Math.max(0, slayScore + inc);
    const level = LEVELS.slice().reverse().find(l => slayScore >= l.min) || LEVELS[0];
    const next = LEVELS.find(l => l.min > level.min);
    const progress = next
      ? Math.min(100, ((slayScore - level.min) / (next.min - level.min)) * 100)
      : 100;

    const v = $('slay-value');
    const lv = $('slay-level');
    const fill = $('slay-fill');
    if (v) v.textContent = slayScore;
    if (lv) lv.textContent = level.emoji;
    if (fill) fill.style.width = progress + '%';

    if (level.min > prevLevel.min) {
      showLevelUp(level);
      awardBadge('level_' + level.min);
      triggerConfetti(60);
      playSlayChime(1);
    }

    if (slayScore >= 5) awardBadge('first_blood');
    if (currentStreak >= 5) awardBadge('hot_streak');
    if (gayMoments.length >= 5) awardBadge('collector');
    if (slayScore >= 100) awardBadge('icon');

  function playSendSound() {
    if (!soundEnabled) return;
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value = 520;
      g.gain.value = 0.04;
      o.start();
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.12);
      o.stop(ctx.currentTime + 0.12);
    } catch (e) {}
  }

  function playSlayChime(vol = 0.5) {
    if (!soundEnabled) return;
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = 'sine';
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value = 660;
      g.gain.value = 0.03 * vol;
      o.start();
      setTimeout(() => { o.frequency.value = 880; }, 60);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.35);
      o.stop(ctx.currentTime + 0.35);
    } catch (e) {}
  }

  function triggerConfetti(n = 40) {
    const canvas = $('confetti');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const colors = ['#ff4db8', '#b44dff', '#e8c547', '#5dffc7', '#ff2d8a', '#fff'];
    const parts = Array.from({ length: n }, () => ({
      x: Math.random() * canvas.width,
      y: -20 - Math.random() * 80,
      r: 3 + Math.random() * 5,
      c: pick(colors),
      vy: 2 + Math.random() * 4,
      vx: -2 + Math.random() * 4,
      a: 1
    }));
    let frames = 0;
    function tick() {
      frames++;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      parts.forEach(p => {
        p.x += p.vx; p.y += p.vy; p.a -= 0.012;
        ctx.globalAlpha = Math.max(0, p.a);
        ctx.fillStyle = p.c;
        ctx.fillRect(p.x, p.y, p.r, p.r * 1.4);
      });
      ctx.globalAlpha = 1;
      if (frames < 90) requestAnimationFrame(tick);
      else ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
    tick();
  }

  function scoreServe(text) {
    // Authored scoring: length, specificity, comedy signals — not random-only
    const t = (text || '').trim();
    const words = t.split(/\s+/).filter(Boolean);
    let score = 5;
    if (words.length >= 8) score += 1;
    if (words.length >= 18) score += 1;
    if (words.length >= 35) score += 1;
    if (words.length < 4) score -= 2;
    if (/[!?]/.test(t)) score += 0.5;
    if (/\b(I|I'm|my|we|outfit|wore|said|looked|walked|muted|ex|boss|cart|jacket|hair|face)\b/i.test(t)) score += 1;
    if (/\b(yasss|slay|serve|periodt|cunt|mother|realness)\b/i.test(t)) score += 0.5;
    // Detail bonus: commas / concrete nouns vibe
    if ((t.match(/,/g) || []).length >= 2) score += 0.5;
    if (t.length > 160) score += 0.5;
    // Slight persona spice, still bounded
    score += (Math.random() * 1.2) - 0.3;
    return Math.max(3, Math.min(10, Math.round(score * 10) / 10));
  }

    const judges = PANEL.slice().sort(() => Math.random() - 0.5).slice(0, 3);
    return judges.map(j => {
      let line;
      if (score >= 9) {
        line = pick([
          `${j.emoji} ${j.name}: 10s. "${snip}…" is why we leave the house.`,
          `${j.emoji} ${j.name}: Mother. Category ${catTitle} is shook.`

      } else if (score >= 7) {
        line = pick([
          `${j.emoji} ${j.name}: Solid. Construction is there. Push the face more.`,
          `${j.emoji} ${j.name}: Safe 8 energy — elevate the last sentence next time.`
        ]);
      } else if (score >= 5) {
        line = pick([
          `${j.emoji} ${j.name}: Mid with potential. More detail, less thesis statement.`,
          `${j.emoji} ${j.name}: The panel is awake but not gagged. Try again harder next round.`

  async function judgeBallroomServe(serveText) {
    const b = ballroom;
    if (!b || !b.category) return;
    b.phase = 'judging';
    const cat = b.category;
    const typing = showTyping();
    await sleep(500 + Math.random() * 400);

    const score = scoreServe(serveText);
    const critique = critiqueForScore(score, serveText, cat);
    removeTyping(typing);

    b.rounds.push({ title: cat.title, score, serve: serveText.slice(0, 120) });
    addMessage('bot', critique, { isGayified: true, source: 'studio' });
    markUsedLine(critique);

    // Panel side-chatter
    const reads = panelReads(score, serveText, cat.title);
    for (const line of reads) {
      await sleep(380);
      addMessage('side', line, { side: true });
    }

    // Scoreboard as system-styled bot bubble via HTML injection — use system text
    addMessage('system', `SCOREBOARD · Round ${b.round}: ${score}/10 · Running: ${b.rounds.reduce((s, r) => s + r.score, 0).toFixed(1)}/30`);

    // Also show rich scoreboard in a bot message

    const row = document.createElement('div');

    $('messages').appendChild(row);
    $('messages').scrollTop = $('messages').scrollHeight;

    updateSlayScore(Math.round(score));
    if (score >= 9) triggerConfetti(40);

    if (b.round >= b.maxRounds) {
      await finishBallroom();
    } else {
      b.round += 1;
      await sleep(700);
      await advanceBallroomRound();
    }
  }

  function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
    const words = String(text).split(' ');
    let line = '';
    for (let n = 0; n < words.length; n++) {
      const test = line + words[n] + ' ';
      if (ctx.measureText(test).width > maxWidth && n > 0) {
        ctx.fillText(line, x, y);
        line = words[n] + ' ';
        y += lineHeight;
      } else line = test;
    }
    ctx.fillText(line, x, y);
  }

  function setupMobileChrome() {
    const root = document.documentElement;
    const app = $('app');

    function setVVH() {
      const vv = window.visualViewport;
      const h = vv ? vv.height : window.innerHeight;
      root.style.setProperty('--vvh', h + 'px');
      if (app) {
        app.style.height = h + 'px';
        app.style.maxHeight = h + 'px';
      }
      // Keyboard open heuristic (mobile)
      const full = window.innerHeight;
      const open = vv && (full - vv.height > 120);
      document.body.classList.toggle('kb-open', !!open);
      if (open) {
        const msgs = $('messages');
        if (msgs) msgs.scrollTop = msgs.scrollHeight;
      }
    }

    setVVH();
    window.addEventListener('resize', setVVH);
    window.addEventListener('orientationchange', () => setTimeout(setVVH, 120));
    if (window.visualViewport) {
      visualViewport.addEventListener('resize', setVVH);
      visualViewport.addEventListener('scroll', setVVH);
    }

    // Keep focused input visible above keyboard
    const input = $('message-input');
    if (input) {
      input.addEventListener('focus', () => {
        setTimeout(() => {
          setVVH();
          input.scrollIntoView({ block: 'end', behavior: 'smooth' });
          const msgs = $('messages');
          if (msgs) msgs.scrollTop = msgs.scrollHeight;
        }, 280);
      });
      input.addEventListener('blur', () => setTimeout(setVVH, 100));
    }
  }

  function registerServiceWorker() {
    if (!('serviceWorker' in navigator)) return;
    // Only on http(s) hosts (GitHub Pages / local server) — not file://
    if (location.protocol === 'file:') return;
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  }

  function isStandaloneApp() {
    return window.matchMedia('(display-mode: standalone)').matches || !!navigator.standalone;
  }

  function isIOSDevice() {
    return /iPad|iPhone|iPod/.test(navigator.userAgent) ||
      (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
  }

  function isAndroidDevice() {
    return /Android/i.test(navigator.userAgent);
  }

  function isSlowNetwork() {
    if (!navigator.onLine) return true;
    const c = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
    if (!c) return false;
    if (c.saveData) return true;
    const t = (c.effectiveType || '').toLowerCase();
    if (t === 'slow-2g' || t === '2g' || t === '3g') return true;
    // Very low downlink (Mbps)
    if (typeof c.downlink === 'number' && c.downlink > 0 && c.downlink < 1.2) return true;
    if (typeof c.rtt === 'number' && c.rtt > 600) return true;
    return false;
  }
