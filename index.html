  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Playfair+Display:wght@700&amp;display=swap');
    
    :root {
      --pink: #ff69b4;
    }
    
    body {
      font-family: 'Inter', system_ui, sans-serif;
      background: 
        radial-gradient(circle at 15% 10%, rgba(212, 175, 55, 0.04) 0%, transparent 40%),
        radial-gradient(circle at 85% 90%, rgba(192, 38, 255, 0.06) 0%, transparent 45%),
        radial-gradient(circle at 50% 50%, rgba(255, 105, 180, 0.03) 0%, transparent 70%),
        linear-gradient(180deg, #050308 0%, #0f0a14 35%, #050308 100%);
      background-attachment: fixed;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    
    .title-font {
      font-family: 'Playfair Display', Georgia, serif;
      letter-spacing: -0.02em;
    }

    .chat-container {
      background: rgba(255, 255, 255, 0.065);
      backdrop-filter: blur(36px);
      -webkit-backdrop-filter: blur(36px);
      border: 1px solid rgba(255, 255, 255, 0.22);
      box-shadow: 
        0 45px 90px -25px rgb(0 0 0 / 0.65),
        0 0 0 1px rgba(212, 175, 55, 0.12) inset,
        inset 0 1px 0 rgba(255,255,255,0.18),
        0 0 140px -35px rgba(192, 38, 255, 0.18);
      transition: all 0.45s cubic-bezier(0.23, 1.0, 0.32, 1);
      position: relative;
      overflow: hidden;
      border-radius: 26px;
    }
    
    @media (max-width: 640px) {
      .chat-container {
        border-radius: 22px;
        box-shadow: 
          0 28px 55px -15px rgb(0 0 0 / 0.55),
          0 0 0 1px rgba(212, 175, 55, 0.1) inset;
        margin: 0 -4px; /* edge to edge on very small for immersive */
      }
    }
    
    .chat-container::before {
      content: '';
      position: absolute;
      inset: 0;
      background: 
        linear-gradient(135deg, rgba(255,255,255,0.07) 0%, transparent 45%),
        linear-gradient(45deg, rgba(212, 175, 55, 0.035) 0%, transparent 55%),
        radial-gradient(circle at 50% 20%, rgba(255,255,255,0.015) 0%, transparent 70%);
      pointer-events: none;
      z-index: 1;
    }
    
    .chat-container::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(212,175,55,0.015) 0%, transparent 25%, transparent 75%, rgba(255,105,180,0.015) 100%);
      pointer-events: none;
      z-index: 1;
    }
    
    .chat-container:hover {
      transform: translateY(-3px);
      box-shadow: 
        0 55px 110px -28px rgb(0 0 0 / 0.7),
        0 0 0 1px rgba(212, 175, 55, 0.22) inset,
        0 0 160px -40px rgba(192, 38, 255, 0.22);
    }

    /* Mobile specific rich tweaks */
    @media (max-width: 640px) {
      .message-bubble {
        padding: 12px 16px;
        font-size: 14.5px;
        border-radius: 18px;
      }
      .user-bubble {
        border-radius: 18px 18px 6px 18px;
      }
      .bot-bubble {
        border-radius: 18px 18px 18px 6px;
      }
      .chat-input {
        font-size: 15px;
        padding: 12px 16px;
      }
      #slay-score {
        font-size: 9px;
        padding: 4px 6px;
      }
      .bot-avatar {
        width: 28px;
        height: 28px;
        font-size: 13px;
      }
      /* Extra declutter & tap comfort on small phones */
      .chat-container {
        border-radius: 20px;
        margin-left: -2px;
        margin-right: -2px;
      }
      #messages {
        padding-left: 10px !important;
        padding-right: 10px !important;
      }
      .persona-btn {
        width: 22px !important;
        height: 22px !important;
        font-size: 10px !important;
      }
      /* Upload box breathes on mobile */
      .max-w-\[280px\] {
        max-width: 92% !important;
      }
    }
    @media (max-width: 380px) {
      .message-bubble { font-size: 14px; padding: 10px 13px; }
      #persona-picker { gap: 1px; }
    }

    .message-bubble {
      max-width: 78%;
      padding: 18px 22px;
      line-height: 1.5;
      position: relative;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      border: 1px solid rgba(255,255,255,0.06);
    }

    .user-bubble {
      background: linear-gradient(135deg, #ff69b4 0%, #ff1493 35%, #c026ff 100%);
      color: white;
      border-radius: 26px 26px 10px 26px;
      box-shadow: 
        0 14px 35px -12px rgb(255 105 180 / 0.55),
        0 8px 16px -3px rgb(0 0 0 / 0.25),
        inset 0 1.5px 0 rgba(255,255,255,0.4),
        inset 0 -1px 0 rgba(0,0,0,0.15);
      position: relative;
      overflow: hidden;
    }
    
    .user-bubble::after {
      content: '';
      position: absolute;
      top: -60%;
      left: -60%;
      width: 40%;
      height: 220%;
      background: linear-gradient(
        90deg,
        transparent,
        rgba(255,255,255,0.4),
        transparent
      );
      transform: skewX(-28deg);
      animation: shimmer 2.6s infinite;
    }

    .bot-bubble {
      background: rgba(28, 14, 32, 0.82);
      border: 1px solid rgba(212, 175, 55, 0.2);
      color: #f8e8ff;
      border-radius: 26px 26px 26px 10px;
      box-shadow: 
        0 12px 28px -10px rgb(0 0 0 / 0.45),
        0 0 0 1px rgba(212, 175, 55, 0.12) inset,
        inset 0 1px 0 rgba(255,255,255,0.1);
      backdrop-filter: blur(18px);
    }

    .message-bubble p {
      margin: 0;
    }

    .gay-text {
      font-weight: 500;
      line-height: 1.5;
    }

    .chat-scroll {
      scrollbar-width: thin;
      scrollbar-color: rgba(255, 105, 180, 0.4) transparent;
    }

    .chat-scroll::-webkit-scrollbar {
      width: 5px;
    }
    .chat-scroll::-webkit-scrollbar-thumb {
      background-color: rgba(255, 105, 180, 0.4);
      border-radius: 20px;
    }

    .pride-gradient {
      background: linear-gradient(90deg, #ff69b4, #c026ff, #6366f1, #ff69b4);
      background-size: 200% 100%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: pride-shift 3s linear infinite;
    }

    @keyframes pride-shift {
      0% { background-position: 0% 50%; }
      100% { background-position: 200% 50%; }
    }

    .sparkle {
      animation: sparkle-anim 1.2s ease forwards;
    }

    .flair {
      font-size: 0.95rem;
      opacity: 0.95;
    }

    .chat-input {
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      background: rgba(255,255,255,0.08);
    }
    
    .chat-input:focus {
      box-shadow: 0 0 0 4px rgba(255, 105, 180, 0.2);
      transform: translateY(-1px);
      background: rgba(255,255,255,0.12);
    }

    .gay-button {
      background: linear-gradient(135deg, #ff69b4, #c026ff);
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }
    
    .gay-button::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 50%; height: 100%;
      background: linear-gradient(
        90deg,
        transparent,
        rgba(255,255,255,0.3),
        transparent
      );
      transition: 0.6s;
    }
    
    .gay-button:hover::before {
      left: 250%;
    }
    
    .gay-button:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 15px 25px -8px rgb(255 105 180 / 0.4), 
                  0 8px 10px -6px rgb(255 105 180 / 0.3);
    }

    .gay-button:active {
      transform: scale(0.98);
    }

    .message-enter {
      animation: message-pop 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes message-pop {
      from {
        opacity: 0;
        transform: translateY(16px) scale(0.94);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .bot-avatar {
      background: linear-gradient(135deg, #c026ff, #ff69b4, #ff1493);
      box-shadow: 0 0 0 5px rgba(192, 38, 255, 0.3),
                  0 6px 16px -4px rgb(0 0 0 / 0.3),
                  inset 0 1px 0 rgba(255,255,255,0.2);
      transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.25s ease;
    }
    
    .bot-avatar:hover {
      transform: scale(1.08) rotate(3deg);
      box-shadow: 0 0 0 6px rgba(192, 38, 255, 0.4),
                  0 8px 20px -4px rgb(0 0 0 / 0.4);
    }

    .typing-dot {
      animation: typing-bounce 1.2s infinite ease-in-out;
    }
    
    .typing-dot:nth-child(2) { animation-delay: 0.15s; }
    .typing-dot:nth-child(3) { animation-delay: 0.3s; }

    .rainbow-text {
      background: linear-gradient(to right, #ff69b4, #c026ff, #6366f1, #ff69b4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-size: 200% auto;
      animation: pride-shift 2.5s linear infinite;
    }

    .slay-progress {
      height: 4px;
      background: linear-gradient(to right, #ff69b4, #c026ff);
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      border-radius: 999px;
    }

    .premium-shadow {
      box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 
                  0 8px 10px -6px rgb(0 0 0 / 0.1);
    }

    /* Mobile-friendly dynamic height (accounts for keyboard, notches, browser UI) */
    .min-h-dvh {
      min-height: 100dvh; /* modern */
      min-height: 100vh;  /* fallback */
    }

    @media (max-width: 640px) {
      .message-bubble {
        padding: 11px 14px;
        font-size: 15px;
      }
      .chat-input {
        padding-top: 0.625rem;
        padding-bottom: 0.625rem;
      }
    }

    .gay-image {
      border: 5px solid #d4af37;
      box-shadow: 
        0 0 25px rgba(212, 175, 55, 0.5),
        0 0 45px rgba(255, 105, 180, 0.35),
        0 12px 35px -12px rgb(0 0 0 / 0.45);
      filter: saturate(1.55) hue-rotate(10deg) brightness(1.06) contrast(1.08);
      transition: all 0.45s cubic-bezier(0.23, 1.0, 0.32, 1);
    }
    
    .gay-image:hover {
      filter: saturate(1.7) hue-rotate(18deg) brightness(1.09) contrast(1.1);
      transform: scale(1.02);
      box-shadow: 
        0 0 30px rgba(212, 175, 55, 0.65),
        0 0 55px rgba(255, 105, 180, 0.45),
        0 15px 40px -15px rgb(0 0 0 / 0.5);
    }

    .premium-shadow {
      box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 
                  0 8px 10px -6px rgb(0 0 0 / 0.1);
    }

    /* World-class premium touches */
    .chat-container {
      position: relative;
    }
    
    .chat-container::before {
      content: '';
      position: absolute;
      top: -1px; left: -1px; right: -1px; bottom: -1px;
      background: linear-gradient(45deg, #ff69b4, #c026ff, #6366f1, #ff69b4);
      background-size: 300% 300%;
      border-radius: 24px;
      z-index: -1;
      opacity: 0.08;
      animation: pride-shift 8s ease infinite;
      pointer-events: none;
    }

    .legendary {
      animation: legendary-glow 1.5s ease-in-out infinite alternate;
    }

    @keyframes legendary-glow {
      from { box-shadow: 0 0 15px #ffd700, 0 0 30px #ff69b4; }
      to { box-shadow: 0 0 25px #ffd700, 0 0 50px #c026ff; }
    }

    .gay-moment {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .gay-moment:hover {
      transform: translateY(-2px);
      filter: brightness(1.05);
    }

    /* Persona micro buttons - always touchable, gold ring on active */
    .persona-btn {
      border-color: rgba(255,255,255,0.25);
      transition: box-shadow .15s ease, transform .1s ease;
    }
    .persona-btn:active {
      transform: scale(0.92);
    }

    /* === GREAT DEMO PRODUCT: Mobile-first rearch === */
    .app-container {
      /* On mobile: full immersive app feel */
      box-shadow: 0 0 0 1px rgba(255,255,255,0.1);
    }

    @media (max-width: 640px) {
      body {
        padding: 0;
        background-attachment: scroll; /* better perf/scroll on mobile */
      }
      .app-container {
        max-width: 100%;
        height: 100dvh;
        border-radius: 0;
        margin: 0;
        border: none;
      }
      .chat-container {
        border-radius: 0;
        margin: 0;
        box-shadow: none;
      }
      .chat-scroll {
        padding-bottom: 80px; /* room for fixed input */
      }
    }

    /* Bottom sheet for mobile modals/personas - premium feel */
    .bottom-sheet {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(10, 5, 15, 0.98);
      border-radius: 20px 20px 0 0;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 -20px 60px -15px rgb(0 0 0 / 0.6);
      z-index: 999;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
      max-height: 85dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .bottom-sheet.open {
      transform: translateY(0);
    }
    .sheet-header {
      padding: 12px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .sheet-content {
      padding: 16px;
      overflow-y: auto;
      flex: 1;
    }
    .sheet-handle {
      width: 36px;
      height: 4px;
      background: rgba(255,255,255,0.3);
      border-radius: 2px;
      margin: 8px auto;
      flex-shrink: 0;
    }

    /* Persona selector - mobile friendly horizontal scroller with better tap */
    .persona-scroller {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 8px 0;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    .persona-scroller::-webkit-scrollbar { display: none; }
    .persona-chip {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 64px;
      padding: 8px 10px;
      border-radius: 14px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      transition: all 0.15s ease;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .persona-chip.active {
      background: rgba(212,175,55,0.15);
      border-color: #d4af37;
      transform: scale(1.02);
    }
    .persona-chip .emoji { font-size: 22px; line-height: 1; }
    .persona-chip .name { font-size: 9px; margin-top: 4px; opacity: 0.8; white-space: nowrap; }

    /* Better chat bubbles for demo readability on mobile */
    .message-bubble {
      font-size: 15px;
      line-height: 1.4;
    }

    /* AI indicator polish */
    .ai-badge {
      font-size: 9px;
      padding: 1px 5px;
      border-radius: 999px;
      background: linear-gradient(90deg, #10b981, #34d399);
      color: #052e16;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    /* Demo seed button */
    .demo-seed {
      font-size: 12px;
      padding: 6px 12px;
      background: linear-gradient(135deg, rgba(212,175,55,0.15), rgba(255,105,180,0.1));
      border: 1px solid rgba(212,175,55,0.3);
      border-radius: 999px;
      color: #d4af37;
      white-space: nowrap;
      transition: all .15s ease;
    }
    .demo-seed:active { transform: scale(0.98); background: rgba(212,175,55,0.25); }

    /* Persona live theme accents (subtle for demo) */
    .theme-femme .chat-container { box-shadow: 0 0 0 1px rgba(255,105,180,0.2) inset; }
    .theme-camp .chat-container { box-shadow: 0 0 0 1px rgba(255,215,0,0.2) inset; }
    .theme-riot .chat-container { box-shadow: 0 0 0 1px rgba(168,85,247,0.25) inset; }
  </style>
</head>
<body class="bg-zinc-950 text-white flex flex-col min-h-dvh overscroll-none" style="background-image: radial-gradient(circle at 25% 30%, rgba(255,105,180,0.06) 0%, transparent 50%), radial-gradient(circle at 75% 70%, rgba(192,38,255,0.05) 0%, transparent 50%); padding-bottom: max(env(safe-area-inset-bottom), 0); -webkit-tap-highlight-color: transparent;">

    <!-- Luxury frame (desktop only) -->
    <div class="absolute inset-0 pointer-events-none border border-white/10 rounded-[28px] sm:rounded-3xl z-10 hidden sm:block" style="box-shadow: inset 0 0 60px rgba(0,0,0,0.3);"></div>

    <!-- Premium mobile-first Header -->
    <div class="flex items-center justify-between px-4 pt-3 pb-2 relative z-30 bg-gradient-to-b from-black/60 to-transparent sm:from-transparent">
      <div class="flex items-center gap-x-3 min-w-0">
        <div class="w-9 h-9 rounded-2xl flex items-center justify-center text-2xl shadow-inner ring-1 ring-white/20 flex-shrink-0"
             style="background: linear-gradient(145deg, #ff69b4, #c026ff, #ff1493); box-shadow: 0 4px 12px -2px rgba(255,105,180,0.5), inset 0 1px 0 rgba(255,255,255,0.4);">
          💅
        </div>
        <div>
          <div class="flex items-baseline gap-x-1.5">
            <h1 class="text-2xl font-semibold title-font tracking-tighter rainbow-text">gayify</h1>
            <span class="text-[10px] px-1.5 py-px rounded bg-white/10 text-pink-300/70 font-mono tracking-[1px]">LIVE</span>
          </div>
          <div class="text-[10px] text-emerald-400/70 -mt-0.5 flex items-center gap-x-1">
            <span class="inline-block w-1.5 h-1.5 bg-emerald-400 rounded-full animate-pulse"></span>

      </div>

        <div onclick="showPersonaSheet()" class="text-[10px] text-pink-300/70 flex items-center gap-x-1 active:text-pink-300">All <i class="fa-solid fa-chevron-right text-[8px]"></i></div>
      </div>
      <div class="persona-scroller" id="persona-scroller">
        <!-- Populated by JS for live updates -->
      </div>

    async function resizeImage(dataUrl, maxDim = 700) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => {
          let { width, height } = img;
          if (width > maxDim || height > maxDim) {
            const ratio = Math.min(maxDim / width, maxDim / height);
            width = Math.round(width * ratio);
            height = Math.round(height * ratio);
          }
          const canvas = document.createElement('canvas');
          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);
          // JPEG for smaller size, good quality for this fun use
          resolve(canvas.toDataURL('image/jpeg', 0.82));
        };
        img.onerror = () => {
          // Fallback: if format can't be decoded (rare for modern browsers), try to use original
          console.warn('Image decode failed, using original dataUrl');
          resolve(dataUrl);
        };
        img.src = dataUrl;
      });
    }

    function getColorVibe(r, g, b) {

      if (r > 180 && g > 160 && b < 90) return 'golden hour goddess';

    async function getImageVibe(dataUrl) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
          const aspect = img.width / img.height;
          let pose = 'perfectly posed';
          if (aspect > 1.7) pose = 'cinematic wide shot';
          else if (aspect > 1.2) pose = 'landscape legend';
          else if (aspect < 0.65) pose = 'tall drink of water';
          else if (aspect < 0.85) pose = 'portrait perfection';

          // sample colors from small canvas
          const c = document.createElement('canvas');
          c.width = 40; c.height = 40;
          const ctx = c.getContext('2d', { willReadFrequently: true });
          ctx.drawImage(img, 0, 0, 40, 40);
          const pixels = ctx.getImageData(0, 0, 40, 40).data;
          let r = 0, g = 0, b = 0, count = 0;
          for (let i = 0; i < pixels.length; i += 4) {
            r += pixels[i]; g += pixels[i + 1]; b += pixels[i + 2]; count++;
          }
          r = Math.round(r / count);
          g = Math.round(g / count);
          b = Math.round(b / count);

          const colorVibe = getColorVibe(r, g, b);
          const brightness = Math.round((r + g + b) / 3);

          resolve({ colorVibe, pose, brightness, aspect });
        };
        img.src = dataUrl;
      });
    }

    function playSlayChime() {
      try {
        const audio = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audio.createOscillator();
        const gain = audio.createGain();
        osc.type = 'sine';
        osc.frequency.value = 880;
        gain.gain.value = 0.3;
        const filter = audio.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.value = 1200;
        osc.connect(filter);
        filter.connect(gain);
        gain.connect(audio.destination);
        osc.start();
        setTimeout(() => {
          osc.frequency.value = 1320;
          setTimeout(() => {
            gain.gain.value = 0;
            osc.stop();
          }, 180);
        }, 120);
      } catch(e) {}
    }

    function playSendSound() {
      try {
        const audio = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audio.createOscillator();
        const gain = audio.createGain();
        osc.type = 'sawtooth';
        osc.frequency.value = 660;
        gain.gain.value = 0.15;
        osc.connect(gain);
        gain.connect(audio.destination);
        osc.start();
        setTimeout(() => {
          osc.frequency.value = 880;
          setTimeout(() => {
            gain.gain.exponentialRampToValueAtTime(0.001, audio.currentTime + 0.3);
            osc.stop();
          }, 80);
        }, 60);
      } catch(e) {}
    }

      }, 22000);

      // Wire up image upload input (for the camera button)
      const imageInput = document.getElementById('image-input');
      if (imageInput) {
        imageInput.addEventListener('change', (e) => {
          if (e.target.files && e.target.files.length > 0) {
            handleImageUpload(e.target.files[0]);
            e.target.value = ''; // allow re-selecting the same file later
          }
        });
      }

      // Drag & drop support on the messages area – super straightforward
      const dropZone = document.getElementById('messages');
      if (dropZone) {
        dropZone.addEventListener('dragover', (e) => {
          e.preventDefault();
          dropZone.classList.add('!bg-pink-950/40', 'border', 'border-dashed', 'border-pink-400/60');
        });
        dropZone.addEventListener('dragleave', () => {
          dropZone.classList.remove('!bg-pink-950/40', 'border', 'border-dashed', 'border-pink-400/60');
        });
        dropZone.addEventListener('drop', (e) => {
          e.preventDefault();
          dropZone.classList.remove('!bg-pink-950/40', 'border', 'border-dashed', 'border-pink-400/60');
          const file = e.dataTransfer.files[0];
          const isImage = file && (file.type.startsWith('image/') || 
                          file.name.toLowerCase().endsWith('.heic') || 
                          file.name.toLowerCase().endsWith('.heif'));
          if (isImage) {
            handleImageUpload(file);
          } else {
            showToast("Only pics please, queen! (JPEG, PNG, HEIC, etc.)");
          }
        });
      }

      // Robustness: listen for online/offline to auto-disable LLM when no network
      window.addEventListener('offline', () => {
        if (llmEnabled) {
          llmEnabled = false;
          updateLlmIcon();
          showToast("Went offline — LLM disabled, pure local juggat active");
        }
      });
      window.addEventListener('online', () => {
        if (openrouterApiKey && !llmEnabled) {
          // Don't auto-reenable to be safe; user can toggle
          showToast("Back online — click 🤖 to re-enable LLM if desired");
        }
      });

      // Since a public key is provided, LLM is on by default for all users.
      // For extra privacy or higher limits, users can click the robot icon to override with their own key.
      // The model is always locked to the free tier.
      updateLlmIcon();
      if (openrouterApiKey) {
        llmEnabled = true;
      }
    }

    // Boot
    window.onload = init;
  </script>
</body>
</html>
