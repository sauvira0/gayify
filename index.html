    lastUploadedImage = null;
    slayScore = 0;
    currentStreak = 0;
    resetComedySession();
    updateSlayScore(0);
    const c = $('messages');
    c.innerHTML = '';
    triggerConfetti(80);
    addMessage('system', '🔥 SESSION BURNED — ashes only. Nothing left to subpoena.');
    setTimeout(() => {
      addMessage('bot', "Well. That was dramatic. I respect it. Rebuilding from the ashes… hi again, criminal. 💅", { isGayified: true, source: 'studio' });
      seedEmpty(false);
    }, 600);
    showToast("Burned. Evidence gone.");
  }

  function copyCaption(text) {
    navigator.clipboard.writeText(text).then(() => showToast("Caption copied 💅")).catch(() => {
      const ta = document.createElement('textarea');
      ta.value = text; document.body.appendChild(ta); ta.select();
      document.execCommand('copy'); ta.remove();
      showToast("Caption copied 💅");
    });
  }

  function copyGayVersion(btn) {
    const bubble = btn.closest('.bot-wrap')?.querySelector('.bubble p');
    const text = bubble ? bubble.textContent : '';
    if (!text) return;
    navigator.clipboard.writeText(text).then(() => showToast("Copied ✨")).catch(() => showToast("Copy failed"));
  }

  function toggleLLM() {
    llmEnabled = !llmEnabled;
    if (llmEnabled) studioOnlyReason = null;
    else if (!studioOnlyReason) studioOnlyReason = 'manual';
    updateLlmIcon();
    showToast(llmEnabled
      ? "Live AI on — quality-gated; Studio if it flops"
      : "Live off — pure Studio (authored comedy)");
  }

  function updateLlmIcon() {
    const chip = $('llm-chip');
    const st = $('llm-status');
    const src = $('source-status-text');
    const live = !!(openrouterApiKey && llmEnabled);
    if (chip) chip.classList.toggle('off', !live);
    if (st) st.textContent = live ? 'LIVE' : 'STUDIO';
    if (src) src.textContent = live ? 'Studio + Live' : 'Studio only';
    if (typeof updateNetPill === 'function') updateNetPill();
  }

  // ═══════════════════════════════════════════════════════════
  // DEMO — cinematic multi-beat showcase
  // ═══════════════════════════════════════════════════════════

  async function runCinematicDemo() {
    if (isBusy) return;
    isBusy = true;
    awardBadge('demo');
    showToast("Demo rolling — sit back 🎬");
    const script = [
      { role: 'system', text: '✦ LIVE DEMO — pure ephemeral chaos' },
      { role: 'user', text: 'This meeting is actually killing my soul' },
      { role: 'bot', text: 'The corporate gays are in their villain era and you\'re the final girl. Bathroom breakdown #1 is valid. Who scheduled this hate crime and do we need to stage a walkout or a fashion show?' },
      { role: 'side', text: '💅 @dollcommittee: "not the soul leaving the Zoom"' },
      { role: 'user', text: 'And then I saw my ex in the break room' },
      { role: 'bot', text: 'STOP. The documentary just got a second season. Did they see the outfit? Did YOU see the outfit? Because if you looked expensive while suffering, that\'s not a loss — that\'s content. Details. Now.' },
      { role: 'side', text: '👑 @motherofthegroup: "10s across the board for emotional damage realness"' },
      { role: 'bot', text: 'Okay your move: block, soft smile, or become hotter in silence? I\'m writing the groupchat recap either way. 💅' }
    ];

    for (const beat of script) {
      await sleep(beat.role === 'side' ? 500 : 700);
      if (beat.role === 'user') {
        addMessage('user', beat.text);
        playSendSound();
      } else if (beat.role === 'side') {
        addMessage('side', beat.text, { side: true });
      } else if (beat.role === 'system') {
        addMessage('system', beat.text);
      } else {
        const t = showTyping();
        await sleep(600);
        removeTyping(t);
        addMessage('bot', beat.text, { isGayified: true });
      }
    }
    triggerConfetti(50);
    isBusy = false;
    showToast("Your turn — type or upload 💅");
  }

  function seedEmpty(withHero = true) {
    const c = document.getElementById('messages');
    if (!c || !withHero) return;
    const hero = document.createElement('div');
    hero.className = 'empty-hero';
    hero.innerHTML = `
      <div style="font-size:36px;">💅</div>
      <h2>What's up?</h2>
      <p>Type below. I'll reply.</p>`;
    c.appendChild(hero);
  }

  function addWelcome() {
    seedEmpty();
    setTimeout(() => {
      try {
        addMessage('bot',
          "Hey. I'm ChakkaAI — type anything and I'll reply. Try: how are you",
          { isGayified: true, source: 'studio', skipQuick: true }
        );
      } catch (e) {
        console.error(e);
      }
      const input = document.getElementById('message-input');
      if (input) {
        // Don't auto-open mobile keyboard; desktop OK
        try {
          if (!window.matchMedia('(pointer: coarse)').matches) input.focus();
        } catch (e) {}
      }
    }, 200);
  }

  // ═══════════════════════════════════════════════════════════
  // INIT
  // ═══════════════════════════════════════════════════════════

  function init() {
    try { preferStudioOnSlowNetwork(); } catch (e) {}
    llmEnabled = false; // keep replies instant
    try { renderPersonas(); } catch (e) {}
    try { updateSlayScore(0); } catch (e) {}
    try { updateLlmIcon(); } catch (e) {}
    try { setupMobileChrome(); } catch (e) {}
    addWelcome();

    const input = document.getElementById('message-input');
    if (input) {
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); sendMessage(); }
      });
    }
    const imageInput = document.getElementById('image-input');
    if (imageInput) {
      imageInput.addEventListener('change', (e) => {
        if (e.target.files && e.target.files[0]) {
          handleImageUpload(e.target.files[0]);
          e.target.value = '';
        }
      });
    }
    console.log('[gayify] simple mode — type and get a reply');
  }

  // Boot
  try { setupMobileChrome(); } catch (e) {}
  try { registerServiceWorker(); } catch (e) {}
  try { preferStudioOnSlowNetwork(); } catch (e) {}
  llmEnabled = false;

  window.sendMessage = sendMessage;
  window.usePrompt = usePrompt;
  window.clearChat = clearChat;
  window.triggerImageUpload = triggerImageUpload;

  const splashBtn = document.getElementById('splash-enter');
  if (splashBtn) {
    splashBtn.addEventListener('click', () => {
      try { haptic(); } catch (e) {}
      enterAppFromSplash();
    });
  }

  </script>
</body>
