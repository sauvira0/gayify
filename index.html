    :root {

    body {
      font-family: 'Inter', system_ui, sans-serif;
      background: 
        radial-gradient(circle at 15% 10%, rgba(212, 175, 55, 0.04) 0%, transparent 40%),

        radial-gradient(circle at 50% 50%, rgba(255, 105, 180, 0.03) 0%, transparent 70%),

      background-attachment: fixed;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    
    .title-font {
      font-family: 'Playfair Display', Georgia, serif;
      letter-spacing: -0.02em;
    }

    .chat-container {
      background: rgba(255, 255, 255, 0.065);
      backdrop-filter: blur(36px);
      -webkit-backdrop-filter: blur(36px);
      border: 1px solid rgba(255, 255, 255, 0.22);
      box-shadow: 
        0 45px 90px -25px rgb(0 0 0 / 0.65),
        0 0 0 1px rgba(212, 175, 55, 0.12) inset,
        inset 0 1px 0 rgba(255,255,255,0.18),
        0 0 140px -35px rgba(192, 38, 255, 0.18);
      transition: all 0.45s cubic-bezier(0.23, 1.0, 0.32, 1);
      position: relative;
      overflow: hidden;
      border-radius: 26px;
    }
    
    @media (max-width: 640px) {
      .chat-container {
        border-radius: 22px;
        box-shadow: 
          0 28px 55px -15px rgb(0 0 0 / 0.55),
          0 0 0 1px rgba(212, 175, 55, 0.1) inset;
      }
    }
    
    .chat-container::before {
      content: '';
      position: absolute;
      inset: 0;
      background: 
        linear-gradient(135deg, rgba(255,255,255,0.07) 0%, transparent 45%),
        linear-gradient(45deg, rgba(212, 175, 55, 0.035) 0%, transparent 55%),
        radial-gradient(circle at 50% 20%, rgba(255,255,255,0.015) 0%, transparent 70%);
      pointer-events: none;
      z-index: 1;
    }
    
    .chat-container::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(212,175,55,0.015) 0%, transparent 25%, transparent 75%, rgba(255,105,180,0.015) 100%);
      pointer-events: none;
      z-index: 1;
    }
    
    .chat-container:hover {
      transform: translateY(-3px);
      box-shadow: 
        0 55px 110px -28px rgb(0 0 0 / 0.7),
        0 0 0 1px rgba(212, 175, 55, 0.22) inset,
        0 0 160px -40px rgba(192, 38, 255, 0.22);
    }

    .message-bubble {
      max-width: 78%;
      padding: 18px 22px;
      line-height: 1.5;
      position: relative;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      border: 1px solid rgba(255,255,255,0.06);
    }

    .user-bubble {
      background: linear-gradient(135deg, #ff69b4 0%, #ff1493 35%, #c026ff 100%);
      color: white;
      border-radius: 26px 26px 10px 26px;
      box-shadow: 
        0 14px 35px -12px rgb(255 105 180 / 0.55),
        0 8px 16px -3px rgb(0 0 0 / 0.25),
        inset 0 1.5px 0 rgba(255,255,255,0.4),
        inset 0 -1px 0 rgba(0,0,0,0.15);
      position: relative;
      overflow: hidden;
    }
    
    .user-bubble::after {
      content: '';
      position: absolute;
      top: -60%;
      left: -60%;
      width: 40%;
      height: 220%;
      background: linear-gradient(
        90deg,
        transparent,
        rgba(255,255,255,0.4),
        transparent
      );
      transform: skewX(-28deg);
      animation: shimmer 2.6s infinite;
    }

    .bot-bubble {
      background: rgba(28, 14, 32, 0.82);
      border: 1px solid rgba(212, 175, 55, 0.2);
      color: #f8e8ff;
      border-radius: 26px 26px 26px 10px;
      box-shadow: 
        0 12px 28px -10px rgb(0 0 0 / 0.45),
        0 0 0 1px rgba(212, 175, 55, 0.12) inset,
        inset 0 1px 0 rgba(255,255,255,0.1);
      backdrop-filter: blur(18px);
    }

    .message-bubble p {
      margin: 0;
    }

    .gay-text {
      font-weight: 500;
      line-height: 1.5;
    }

    .chat-scroll {
      scrollbar-width: thin;
      scrollbar-color: rgba(255, 105, 180, 0.4) transparent;
    }

    .chat-scroll::-webkit-scrollbar {
      width: 5px;
    }
    .chat-scroll::-webkit-scrollbar-thumb {
      background-color: rgba(255, 105, 180, 0.4);
      border-radius: 20px;
    }

    .pride-gradient {
      background: linear-gradient(90deg, #ff69b4, #c026ff, #6366f1, #ff69b4);
      background-size: 200% 100%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: pride-shift 3s linear infinite;
    }

    @keyframes pride-shift {
      0% { background-position: 0% 50%; }
      100% { background-position: 200% 50%; }
    }

    .sparkle {
      animation: sparkle-anim 1.2s ease forwards;
    }

    .flair {
      font-size: 0.95rem;
      opacity: 0.95;
    }

    .chat-input {
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      background: rgba(255,255,255,0.08);
    }

      box-shadow: 0 0 0 4px rgba(255, 105, 180, 0.2);
      transform: translateY(-1px);
      background: rgba(255,255,255,0.12);
    }

    .gay-button {
      background: linear-gradient(135deg, #ff69b4, #c026ff);
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }
    
    .gay-button::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 50%; height: 100%;
      background: linear-gradient(
        90deg,
        transparent,
        rgba(255,255,255,0.3),
        transparent
      );
      transition: 0.6s;
    }
    
    .gay-button:hover::before {
      left: 250%;
    }
    
    .gay-button:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 15px 25px -8px rgb(255 105 180 / 0.4), 
                  0 8px 10px -6px rgb(255 105 180 / 0.3);
    }

    .gay-button:active {
      transform: scale(0.98);
    }

    .message-enter {
      animation: message-pop 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes message-pop {
      from {
        opacity: 0;
        transform: translateY(16px) scale(0.94);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .bot-avatar {
      background: linear-gradient(135deg, #c026ff, #ff69b4, #ff1493);
      box-shadow: 0 0 0 5px rgba(192, 38, 255, 0.3),
                  0 6px 16px -4px rgb(0 0 0 / 0.3),
                  inset 0 1px 0 rgba(255,255,255,0.2);
      transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.25s ease;
    }
    
    .bot-avatar:hover {
      transform: scale(1.08) rotate(3deg);
      box-shadow: 0 0 0 6px rgba(192, 38, 255, 0.4),
                  0 8px 20px -4px rgb(0 0 0 / 0.4);
    }

    .typing-dot {
      animation: typing-bounce 1.2s infinite ease-in-out;
    }
    
    .typing-dot:nth-child(2) { animation-delay: 0.15s; }
    .typing-dot:nth-child(3) { animation-delay: 0.3s; }

    .rainbow-text {
      background: linear-gradient(to right, #ff69b4, #c026ff, #6366f1, #ff69b4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-size: 200% auto;
      animation: pride-shift 2.5s linear infinite;
    }

    .slay-progress {
      height: 4px;
      background: linear-gradient(to right, #ff69b4, #c026ff);
      transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      border-radius: 999px;
    }

    .premium-shadow {
      box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 
                  0 8px 10px -6px rgb(0 0 0 / 0.1);
    }

    /* Mobile-friendly dynamic height (accounts for keyboard, notches, browser UI) */
    .min-h-dvh {
      min-height: 100dvh; /* modern */
      min-height: 100vh;  /* fallback */
    }

    @media (max-width: 640px) {
      .message-bubble {
        padding: 11px 14px;
        font-size: 15px;
      }
      .chat-input {
        padding-top: 0.625rem;
        padding-bottom: 0.625rem;
      }
    }

    .gay-image {
      border: 5px solid #d4af37;
      box-shadow: 
        0 0 25px rgba(212, 175, 55, 0.5),
        0 0 45px rgba(255, 105, 180, 0.35),

      filter: saturate(1.55) hue-rotate(10deg) brightness(1.06) contrast(1.08);
      transition: all 0.45s cubic-bezier(0.23, 1.0, 0.32, 1);
    }
    
    .gay-image:hover {
      filter: saturate(1.7) hue-rotate(18deg) brightness(1.09) contrast(1.1);
      transform: scale(1.02);
      box-shadow: 
        0 0 30px rgba(212, 175, 55, 0.65),
        0 0 55px rgba(255, 105, 180, 0.45),
        0 15px 40px -15px rgb(0 0 0 / 0.5);
    }

    .premium-shadow {
      box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 
                  0 8px 10px -6px rgb(0 0 0 / 0.1);
    }

    /* World-class premium touches */
    .chat-container {
      position: relative;
    }
    
    .chat-container::before {
      content: '';
      position: absolute;
      top: -1px; left: -1px; right: -1px; bottom: -1px;
      background: linear-gradient(45deg, #ff69b4, #c026ff, #6366f1, #ff69b4);
      background-size: 300% 300%;
      border-radius: 24px;
      z-index: -1;
      opacity: 0.08;
      animation: pride-shift 8s ease infinite;
      pointer-events: none;
    }

    .legendary {
      animation: legendary-glow 1.5s ease-in-out infinite alternate;
    }

    @keyframes legendary-glow {
      from { box-shadow: 0 0 15px #ffd700, 0 0 30px #ff69b4; }
      to { box-shadow: 0 0 25px #ffd700, 0 0 50px #c026ff; }
    }

    .gay-moment {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .gay-moment:hover {
      transform: translateY(-2px);
      filter: brightness(1.05);
    }
  </style>

      const replacements = {

    // ==================== IMAGE GAYIFICATION (client-side only) ====================

    async function resizeImage(dataUrl, maxDim = 700) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => {
          let { width, height } = img;
          if (width > maxDim || height > maxDim) {
            const ratio = Math.min(maxDim / width, maxDim / height);
            width = Math.round(width * ratio);
            height = Math.round(height * ratio);
          }
          const canvas = document.createElement('canvas');
          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);
          // JPEG for smaller size, good quality for this fun use
          resolve(canvas.toDataURL('image/jpeg', 0.82));
        };
        img.onerror = () => {
          // Fallback: if format can't be decoded (rare for modern browsers), try to use original
          console.warn('Image decode failed, using original dataUrl');
          resolve(dataUrl);
        };
        img.src = dataUrl;
      });
    }

    function getColorVibe(r, g, b) {

      if (b > 170 && r < 140 && g < 160) return 'icy blue baddie';
      if (r > 150 && g < 110 && b > 150) return 'mysterious purple realness';
      if (brightness > 210) return 'bright ethereal';
      if (brightness < 70) return 'dark moody energy';
      if (r > 160 && g > 120 && b > 100) return 'warm sunset';
      return 'chic neutral';
    }

    async function getImageVibe(dataUrl) {

          if (aspect > 1.7) pose = 'cinematic wide shot';
          else if (aspect > 1.2) pose = 'landscape legend';
          else if (aspect < 0.65) pose = 'tall drink of water';
          else if (aspect < 0.85) pose = 'portrait perfection';

          // sample colors from small canvas
          const c = document.createElement('canvas');
          c.width = 40; c.height = 40;
          const ctx = c.getContext('2d', { willReadFrequently: true });
          ctx.drawImage(img, 0, 0, 40, 40);
          const pixels = ctx.getImageData(0, 0, 40, 40).data;
          let r = 0, g = 0, b = 0, count = 0;
          for (let i = 0; i < pixels.length; i += 4) {
            r += pixels[i]; g += pixels[i + 1]; b += pixels[i + 2]; count++;
          }
          r = Math.round(r / count);
          g = Math.round(g / count);
          b = Math.round(b / count);

          const colorVibe = getColorVibe(r, g, b);
          const brightness = Math.round((r + g + b) / 3);

          resolve({ colorVibe, pose, brightness, aspect });
        };
        img.src = dataUrl;
      });
    }

    async function gayifyImage(originalDataUrl, seed = Math.random()) {
      return new Promise((resolve) => {

          const canvas = document.createElement('canvas');
          canvas.width = img.width;

          else if (currentPersona === 'daddy') filter = `saturate(1.65) hue-rotate(3deg) contrast(1.32) brightness(1.02) sepia(0.15)`;

          ctx.filter = filter;
          ctx.drawImage(img, 0, 0);

          // Rich, expensive glitter, light leaks & bokeh for high-end photography feel
          ctx.filter = 'none';
          ctx.fillStyle = currentPersona === 'mystery' ? 'rgba(220, 200, 255, 0.65)' : 'rgba(255, 255, 255, 0.82)';
          const sparkleCount = 38 + Math.floor(seed * 22);
          for (let i = 0; i < sparkleCount; i++) {
            const x = (Math.sin(i * 11.8 + seed * 1.3) * 0.5 + 0.5) * canvas.width;
            const y = (Math.cos(i * 8.2 + seed) * 0.5 + 0.5) * canvas.height;
            const size = 1.2 + Math.random() * 4.2;
            ctx.globalAlpha = 0.55 + Math.random() * 0.45;
            ctx.beginPath();
            ctx.arc(x, y, size, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1;

            if (i % 2 === 0) {
              ctx.fillRect(x - size*2.2, y-0.5, size*4.4, 1);
              ctx.fillRect(x-0.5, y - size*2.2, 1, size*4.4);
            }
          }

          // Subtle bokeh orbs for rich depth

          for (let i = 0; i < 6; i++) {

            const by = (seed * 31 + i * 29) % canvas.height;

          ctx.strokeStyle = edgeColor;
          ctx.lineWidth = Math.max(6, canvas.width * 0.01);
          ctx.strokeRect(0, 0, canvas.width, canvas.height);

          // Elegant, expensive caption treatment with gold foil vibe + luxury vignette
          ctx.fillStyle = currentPersona === 'daddy' ? 'rgba(45,42,38,0.92)' : 'rgba(255, 105, 180, 0.9)';

          ctx.textAlign = 'center';
          const tag = currentPersona === 'daddy' ? 'YOURS' : 'SEDUCED';

          ctx.fillStyle = currentPersona === 'daddy' ? '#e8d9c8' : '#f5f0e6';
          ctx.fillText(tag, canvas.width / 2, tagY - 1);

          // Subtle expensive vignette for rich photo depth

          ctx.fillRect(0, 0, canvas.width, canvas.height);

        piece.style.top = '-10px';
        piece.style.opacity = Math.random() + 0.5;
        piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
        piece.style.transform = `rotate(${Math.random() * 360}deg)`;
        confettiContainer.appendChild(piece);

        const duration = 1500 + Math.random() * 2000;
        const angle = Math.random() * 60 + 30; // downward angle
        piece.animate([
          { transform: `translateY(0) rotate(0deg)`, opacity: piece.style.opacity },
          { transform: `translateY(${window.innerHeight + 50}px) rotate(${Math.random() * 720 - 360}deg)`, opacity: 0 }
        ], {
          duration: duration,
          easing: 'cubic-bezier(0.25, 0.1, 0.25, 1)'
        }).onfinish = () => piece.remove();
      }

      setTimeout(() => confettiContainer.remove(), 4000);
    }

    function playSlayChime() {
      try {
        const audio = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audio.createOscillator();
        const gain = audio.createGain();
        osc.type = 'sine';
        osc.frequency.value = 880;
        gain.gain.value = 0.3;
        const filter = audio.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.value = 1200;
        osc.connect(filter);
        filter.connect(gain);
        gain.connect(audio.destination);
        osc.start();
        setTimeout(() => {
          osc.frequency.value = 1320;
          setTimeout(() => {
            gain.gain.value = 0;
            osc.stop();
          }, 180);
        }, 120);
      } catch(e) {}
    }

    function playSendSound() {
      try {
        const audio = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audio.createOscillator();
        const gain = audio.createGain();
        osc.type = 'sawtooth';
        osc.frequency.value = 660;
        gain.gain.value = 0.15;
        osc.connect(gain);
        gain.connect(audio.destination);
        osc.start();
        setTimeout(() => {
          osc.frequency.value = 880;
          setTimeout(() => {
            gain.gain.exponentialRampToValueAtTime(0.001, audio.currentTime + 0.3);
            osc.stop();
          }, 80);
        }, 60);
      } catch(e) {}
    }

    function changePersona(persona) {
      currentPersona = persona;
      const flavors = {
        femme: "Femme Fatale mode activated. Everything is about to get softer and deadlier 💋",
        camp: "Camp Icon activated. Prepare for maximum theatricality and shade 🌟",
        mystery: "Mysterious Siren mode. The vibes just got dangerously seductive 🖤",
        daddy: "Leather Daddy mode engaged. Things are about to get a little commanding 🖤"
      };
      showToast(flavors[persona] || "Persona updated");
      // Slight visual change
      const header = document.querySelector('.chat-container');
      if (header) {
        header.style.borderColor = persona === 'daddy' ? 'rgba(100,100,100,0.3)' : 'rgba(255,105,180,0.18)';
      }
    }

    function addEasterEggHint() {
      // subtle, only once
      setTimeout(() => {
        const container = document.getElementById('messages');
        if (container.children.length < 3) {
          // user hasn't chatted much
        }
      }, 28000);
    }

    // Keyboard shortcut hint
    function setupKeyboard() {
      document.addEventListener('keydown', function(e) {
        if (e.metaKey && e.key === "/") {
          e.preventDefault();
          document.getElementById('message-input').focus();
        }
      });
      
      // Focus input on load
      setTimeout(() => {
        const inp = document.getElementById('message-input');
        if (inp) inp.focus();
      }, 650);
    }

    // Initialize everything
    function init() {
      initTailwind();
      
      const container = document.getElementById('messages');
      
      // Seed the chat with welcome
      addWelcomeMessage();
      
      // Fun little second message after delay (only if still empty-ish)
      setTimeout(() => {
        if (container.children.length === 1) {
          // Add a cute prompt
          const tip = document.createElement('div');
          tip.className = `flex justify-start opacity-60`;
          tip.innerHTML = `
            <div class="flex gap-x-3 max-w-[90%] sm:max-w-[82%] pl-11">
              <div class="text-[10px] text-white/40">try: "i made pasta" or "my boss is annoying"</div>
            </div>
          `;
          container.appendChild(tip);
          container.scrollTop = container.scrollHeight;
        }
      }, 5200);
      
      setupKeyboard();
      addEasterEggHint();
      
      // Bonus: press "?" to get a random gayified example
      document.addEventListener('keypress', function(e) {
        if (e.key === '?' && document.activeElement.tagName === "BODY") {
          e.preventDefault();
          const examples = [
            "I just got a promotion",
            "My dog ate my homework",
            "This coffee tastes weird",
            "I finally cleaned my room"
          ];
          const ex = examples[Math.floor(Math.random() * examples.length)];
          const input = document.getElementById('message-input');
          input.value = ex;
          sendMessage();
        }
      });
      
      // Dev console joke
      console.log('%c[ gayify ] The gayest chatbot in the land. Everything is gayer now.', 'color:#ff69b4');

      // Init slay score display
      updateSlayScore(0);
      const voiceIconInit = document.getElementById('voice-icon');
      if (voiceIconInit) {
        voiceIconInit.classList.add('fa-microphone');
      }
      // Preload voices for speech
      if ('speechSynthesis' in window) {
        speechSynthesis.getVoices();
      }

      // Fake but addictive group counter for WhatsApp squad energy
      setInterval(() => {
        const countEl = document.getElementById('friend-count');
        if (countEl) {
          let num = parseInt(countEl.textContent) || 12;
          num = Math.max(8, Math.min(28, num + (Math.random() > 0.5 ? 1 : -1)));
          countEl.textContent = num;
        }
      }, 18000);

      // Wire up image upload input (for the camera button)
      const imageInput = document.getElementById('image-input');
      if (imageInput) {
        imageInput.addEventListener('change', (e) => {
          if (e.target.files && e.target.files.length > 0) {
            handleImageUpload(e.target.files[0]);
            e.target.value = ''; // allow re-selecting the same file later
          }
        });
      }

      // Drag & drop support on the messages area – super straightforward
      const dropZone = document.getElementById('messages');
      if (dropZone) {
        dropZone.addEventListener('dragover', (e) => {
          e.preventDefault();
          dropZone.classList.add('!bg-pink-950/40', 'border', 'border-dashed', 'border-pink-400/60');
        });
        dropZone.addEventListener('dragleave', () => {
          dropZone.classList.remove('!bg-pink-950/40', 'border', 'border-dashed', 'border-pink-400/60');
        });
        dropZone.addEventListener('drop', (e) => {
          e.preventDefault();
          dropZone.classList.remove('!bg-pink-950/40', 'border', 'border-dashed', 'border-pink-400/60');
          const file = e.dataTransfer.files[0];
          const isImage = file && (file.type.startsWith('image/') || 
                          file.name.toLowerCase().endsWith('.heic') || 
                          file.name.toLowerCase().endsWith('.heif'));
          if (isImage) {
            handleImageUpload(file);
          } else {
            showToast("Only pics please, queen! (JPEG, PNG, HEIC, etc.)");
          }
        });
      }
    }

    // Boot
    window.onload = init;
  </script>
</body>
